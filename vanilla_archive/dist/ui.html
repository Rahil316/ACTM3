  <body class="bg-[var(--bg-app)] text-[var(--text-primary)] selection:bg-[var(--accent)] selection:text-white overflow-hidden">
    <!-- Main Screen -->
    <div id="main-screen" class="h-full flex flex-col relative overflow-hidden">
      <!-- Header -->
      <header class="p-3 flex items-center justify-between sticky top-0 z-10 bg-[var(--bg-app)] border-b border-[var(--border)]">
        <h1 class="text-[22px] font-bold text-[var(--text-primary)]">Token Wand</h1>
        <div class="flex gap-1 items-center">
          <button id="btn-more" title="More Options" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] w-10 h-10 flex items-center justify-center rounded-full transition-colors text-[var(--text-primary)]"></button>
          <button id="btn-import" title="Import JSON" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] w-10 h-10 flex items-center justify-center rounded-full transition-colors text-[var(--text-primary)]"></button>
          <button id="btn-version" title="Save Version" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] w-10 h-10 flex items-center justify-center rounded-full transition-colors text-[var(--text-primary)]"></button>
          <button id="btn-settings" title="Settings" class="bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] w-10 h-10 flex items-center justify-center rounded-full transition-colors text-[var(--text-primary)]"></button>
          <button id="btn-run" class="bg-[var(--accent)] hover:opacity-90 flex items-center gap-2 px-5 h-10 rounded-full transition-all font-semibold text-[13px] text-white shadow-[0_4px_12px_var(--accent-glow)]"></button>
        </div>
      </header>

      <!-- Main navigation area — hidden when preview is open -->
      <div id="main-nav-area" class="flex flex-col flex-1 min-h-0">
        <div class="sidebar-tabs">
          <button class="sidebar-tab-btn" data-tab="project" data-t="project">Project</button>
          <button class="sidebar-tab-btn active" data-tab="color-groups" data-t="palette">Palette</button>
          <button class="sidebar-tab-btn" data-tab="roles-config" data-t="roles">Roles</button>
          <button class="sidebar-tab-btn" data-tab="preview" data-t="preview">Preview</button>
        </div>
        <main class="flex-1 overflow-y-auto">
          <div id="sidebar-content-container" class="p-3 space-y-3"></div>
        </main>
      </div>

      <!-- Preview screen — shown in place of main-nav-area -->
      <div id="preview-screen" class="hidden flex-col flex-1 min-h-0">
        <div class="sidebar-tabs">
          <button id="preview-back" class="flex-none w-10 h-8 flex items-center justify-center rounded-full text-[16px] text-[var(--text-muted)] hover:bg-[var(--bg-hover)] hover:text-[var(--text-primary)] transition-colors cursor-pointer shrink-0">‹</button>
          <button class="preview-tab-btn active" data-target="preview-colors">Palette</button>
          <!-- theme tabs injected here by renderPreviewTabs() -->
        </div>
        <div id="preview-content" class="flex-1 overflow-y-auto p-3">
          <div class="p-2">
            <div id="preview-colors" class="preview-panel active"></div>
            <div id="preview-theme-panels"></div>
          </div>
        </div>
      </div>

      <!-- Toast Hub -->
      <div id="toast-hub"></div>

      <!-- Overlays -->
      <div id="overlay" class="overlay absolute inset-0 bg-black/50 z-20 backdrop-blur-sm"></div>

      <!-- Settings Full-Screen -->
      <div id="settings-screen" class="hidden absolute inset-0 z-40 flex flex-col bg-[var(--bg-app)]">
        <!-- Header -->
        <div class="shrink-0 flex items-center justify-between px-4 pt-4 pb-3 border-b border-[var(--border)]">
          <h2 class="text-[18px] font-semibold text-[var(--text-primary)]" data-t="settings">Settings</h2>
          <div class="flex gap-2">
            <button id="settings-cancel" class="h-[36px] px-4 rounded-full border border-[var(--border)] bg-[var(--bg-input)] hover:bg-[var(--bg-hover)] text-[12px] font-medium text-[var(--text-primary)] transition-colors" data-t="cancel">Cancel</button>
            <button id="settings-done" class="h-[36px] px-4 rounded-full bg-[var(--accent)] hover:opacity-90 text-[12px] font-semibold text-white transition-opacity" data-t="done">Done</button>
          </div>
        </div>

        <!-- Tab bar -->
        <div class="shrink-0 flex gap-1 px-2 py-2 border-b border-[var(--border)] overflow-x-auto">
          <button class="settings-tab active" data-tab="tokens" data-t="token-settings">Token Settings</button>
          <button class="settings-tab" data-tab="plugin">Plugin</button>
        </div>

        <!-- Scrollable content -->
        <div class="flex-1 overflow-y-auto">
          <!-- ── TOKEN SETTINGS ── -->
          <div class="settings-panel" data-panel="tokens">
            <div id="settings-panel-tokens" class="p-3 space-y-3"></div>
          </div>

          <!-- ── PLUGIN ── -->
          <div class="settings-panel hidden" data-panel="plugin">
            <div id="settings-panel-plugin" class="p-3 space-y-3"></div>
          </div>

      <div id="more-sheet" class="bottom-sheet absolute bottom-0 left-0 right-0 bg-[var(--bg-panel)] rounded-t-[16px] border-t border-[var(--border)] z-30 max-h-[90%] flex flex-col" inert>

        <div class="px-4 py-3 flex flex-row items-center justify-between gap-2 border-b border-[var(--border)] shrink-0">
          <div>
            <h2 class="text-[18px] font-semibold text-[var(--text-primary)]" data-t="export.export">Export</h2>
            <p class="text-[11px] text-[var(--text-muted)]" data-t="export.zip.instructions">Select formats and export as a ZIP package</p>
          </div>
          <button id="close-more" class="h-[36px] px-3 text-[12px] font-medium rounded-[8px] bg-[var(--bg-input)] border border-[var(--border)] text-[var(--text-primary)] hover:bg-[var(--bg-hover)] cursor-pointer transition-all" data-t="done">Done</button>

        </div>

      <div id="drop-overlay" class="absolute inset-0">
        <div class="flex flex-col items-center gap-4 text-center pointer-events-none">
          <div id="drop-overlay-icon" class="w-16 h-16 bg-[var(--accent)]/10 rounded-2xl flex items-center justify-center text-[var(--accent)]"></div>
          <div>
            <h2 class="text-2xl font-bold mb-1" data-t="import.title">Import Wand File</h2>
            <p class="text-[var(--text-muted)]" data-t="import.subTitle">Drop a .wand file to load your configuration</p>
          </div>
        </div>
      </div>

      <script>
        // Inject icons into fixed chrome elements (header buttons, more-sheet, drop overlay)
        function injectIcons() {
          const iconMap = {
            "btn-more": Icons.More,
            "btn-import": Icons.Import,
            "btn-preview": Icons.Preview,
            "btn-run": Icons.Run + '<span class="text-[14px] font-bold">Run</span>',
            "btn-version": Icons.Bookmark,
            "btn-settings": Icons.Settings,
            "opt-clear-icon": Icons.TrashLarge,
            "drop-overlay-icon": Icons.Upload,
          };
          for (const [id, html] of Object.entries(iconMap)) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = html;
          }
        }
        window.addEventListener("load", injectIcons);
      </script>

function rgbToHsl(r, g, b) {
  if ([r, g, b].some((v) => typeof v !== "number" || v < 0 || v > 255)) return null;

  g /= 255;
  b /= 255;
  const max = Math.max(r, g, b),
    min = Math.min(r, g, b);
  let h,
    s,
    l = (max + min) / 2;
  if (max === min) {
    h = s = 0;
  } else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r:
        h = (g - b) / d + (g < b ? 6 : 0);
        break;
      case g:
        h = (b - r) / d + 2;
        break;
      default:
        h = (r - g) / d + 4;
        break;
    }
    h *= 60;
  }
  return [Math.round(h), Math.round(s * 100), Math.round(l * 100)];

function hexToHsl(hex) {
  const rgb = hexToRgb(hex);
  return rgb ? rgbToHsl(rgb[0], rgb[1], rgb[2]) : null;
}

function hexToHue(hex) {
  const hsl = hexToHsl(hex);
  return hsl ? hsl[0] : null;
}
function hexToSat(hex) {
  const hsl = hexToHsl(hex);
  return hsl ? hsl[1] : null;
}
function hslToRgb(h, s, l) {

const ExportFormatter = {

  toCSV(result, config) {
    const lines = [];

            : config.variations;

function scssSlug(str) {

}

function generateScss(result, config) {
  if (!result || !result.scales) return "";
  const configVariations = (config && config.variations) || [];
  const systemName = (config && config.name) || "tokens";
  const date = new Date().toISOString();

  const hr = (title) => `// ${"=".repeat(58)}\n// ${title}\n// ${"=".repeat(58)}\n\n`;

  let scss = `// ${systemName} — Auto-generated SCSS\n// Generated: ${date}\n// Do not edit manually.\n\n`;
  scss += `@use 'sass:map';\n\n`;

  scss += hr("COLOR SCALE VARIABLES");
  for (const [group, steps] of Object.entries(result.scales)) {
    scss += `// ${group}\n`;
    for (const [step, data] of Object.entries(steps)) {
      if (!data || !data.value) continue;
      scss += `$${scssSlug(group)}-${scssSlug(String(step))}: ${data.value};\n`;
    }
    scss += "\n";
  }

  scss += hr("PER-COLOR SCALE MAPS");
  for (const [group, steps] of Object.entries(result.scales)) {
    scss += `$scale-${scssSlug(group)}: (\n`;
    for (const [step, data] of Object.entries(steps)) {
      if (!data || !data.value) continue;
      scss += `  ${scssSlug(String(step))}: $${scssSlug(group)}-${scssSlug(String(step))},\n`;
    }
    scss += `);\n\n`;
  }

  const scssThemeKeys = Object.keys(result.tokens || {});
  for (const theme of scssThemeKeys) {
    if (!result.tokens[theme]) continue;
    scss += hr(`${theme.toUpperCase()} THEME TOKENS`);
    scss += `$tokens-${scssSlug(theme)}: (\n`;
    for (const [colorName, roles] of Object.entries(result.tokens[theme])) {
      scss += `  // ${colorName}\n`;
      for (const [roleId, variations] of Object.entries(roles)) {
        const roleObj = (config && config.roles[roleId]) || {};
        const roleName = roleObj.name || roleId;
        const variationDefs = roleObj.customVariationList && roleObj.customVariations && roleObj.customVariations.length > 0
          ? roleObj.customVariations
          : configVariations;
        for (let i = 0; i < variationDefs.length; i++) {
          const token = variations[String(i)];
          if (!token) continue;
          const dispName = variationDefs[i].shorthand || variationDefs[i].name;
          const tokenKey = `${scssSlug(colorName)}-${scssSlug(roleName)}-${scssSlug(dispName)}`;
          let scaleRef;
          if (token.tokenRef) {

            const lastDash = token.tokenRef.lastIndexOf("-");
            scaleRef = `$${scssSlug(token.tokenRef.substring(0, lastDash))}-${scssSlug(token.tokenRef.substring(lastDash + 1))}`;
          } else {
            scaleRef = token.value;
          }
          const adjusted = token.isAdjusted ? " " : "";
          scss += `  "${tokenKey}": ${scaleRef},${adjusted}\n`;
        }
      }
    }
    scss += `);\n\n`;
  }

  scss += hr("THEME MIXIN");
  scss += `/// Writes all token map entries as CSS custom properties.\n`;
  scss += `/// Usage: @include apply-theme($tokens-light);\n`;
  scss += `@mixin apply-theme($tokens) {\n`;
  scss += `  @each $name, $value in $tokens {\n`;
  scss += `    --#{$name}: #{$value};\n`;
  scss += `  }\n`;
  scss += `}\n\n`;

  scss += hr("THEME OUTPUT");
  scss += `// Class-based theming\n`;
  for (let ti = 0; ti < scssThemeKeys.length; ti++) {
    const theme = scssThemeKeys[ti];
    const varName = `$tokens-${scssSlug(theme)}`;
    if (ti === 0) {
      scss += `:root,\n[data-theme="${theme}"] {\n  @include apply-theme(${varName});\n}\n\n`;
    } else {
      scss += `[data-theme="${theme}"] {\n  @include apply-theme(${varName});\n}\n\n`;
    }
  }
  const scssDarkKey = scssThemeKeys.find((k) => k.toLowerCase() === "dark");
  if (scssDarkKey) {
    scss += `// OS-level dark mode fallback\n`;
    scss += `@media (prefers-color-scheme: dark) {\n`;
    scss += `  :root:not([data-theme]) {\n`;
    scss += `    @include apply-theme($tokens-${scssSlug(scssDarkKey)});\n`;
    scss += `  }\n`;
    scss += `}\n`;
  }

  return scss;
}

  if (appState.roles.some((r) => !r.name || !r.name.trim()))
    issues.push("One or more roles has an empty name.");
  if (activeVariations.some((v) => !v.name || !v.name.trim()))

function setRole(idx, key, value) {

    const isIndex = appState.roles[idx].mappingMethod === "index";

      if (isNaN(v) || v < 0) v = 0;
      appState.roles[idx].variationTargets[vi] = Math.min(appState.scaleLength - 1, v);
    } else {
      let v = parseFloat(value);
      if (isNaN(v) || v < 1) v = 1;

    let v = parseFloat(value);
    if (isNaN(v)) v = 1;
    appState.roles[idx].minContrast = Math.max(1, Math.min(21, v));

  const role = appState.roles[roleIdx];

  role.customVariations[varIdx][field] = value;

function setVariation(idx, field, value) {
  if (!appState.variations[idx]) return;
  if (field === "name" || field === "shorthand") value = normalizeSegment(value);
  appState.variations[idx][field] = value;
}

const debounce = (fn, delay = 150) => {
  let timeout;
  return function (...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn.apply(this, args), delay);
  };
};

function withPreservedFocus(fn) {
  if (typeof document === "undefined") return fn();
  const activeEl = document.activeElement;
  const activeId = activeEl ? activeEl.id : null;
  const start = activeEl ? activeEl.selectionStart : null;
  const end = activeEl ? activeEl.selectionEnd : null;
  fn();
  if (activeId) {
    const newEl = document.getElementById(activeId);
    if (newEl) {
      newEl.focus();
      if (start !== null && (newEl.type === "text" || newEl.type === "number")) {
        try {
          newEl.setSelectionRange(start, end);
        } catch (e) {
          console.warn("Failed to restore focus range:", e);
        }
      }
    }
  }
}

async function copyToClipboard(text) {
  try {
    if (!navigator.clipboard) throw new Error("Clipboard API not available");
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    console.warn("Clipboard copy failed:", err);
    const textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand("copy");
    } catch (e) {  }
    document.body.removeChild(textArea);
    return true;
  }
}

function bindDragDrop(card, idx, { cardSelector, getIdx, setIdx, onDrop }) {
  card.draggable = true;
  card.addEventListener("dragstart", (e) => {
    setIdx(idx);
    e.dataTransfer.effectAllowed = "move";
    card.style.opacity = "0.5";
  });
  card.addEventListener("dragend", () => {
    setIdx(null);
    card.style.opacity = "";
    document.querySelectorAll(cardSelector).forEach((c) => c.classList.remove("border-t-2", "!border-t-[var(--accent)]"));
  });
  card.addEventListener("dragover", (e) => {
    const src = getIdx();
    if (src === null || src === idx) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    document.querySelectorAll(cardSelector).forEach((c) => c.classList.remove("border-t-2", "!border-t-[var(--accent)]"));
    card.classList.add("border-t-2", "!border-t-[var(--accent)]");
  });
  card.addEventListener("dragleave", (e) => {
    if (!card.contains(e.relatedTarget)) card.classList.remove("border-t-2", "!border-t-[var(--accent)]");
  });
  card.addEventListener("drop", (e) => {
    e.preventDefault();
    const src = getIdx();
    if (src === null || src === idx) return;
    onDrop(src, idx);
  });
}

const el = (tag, attrs = {}, children = []) => {
  const element = document.createElement(tag);
  Object.entries(attrs).forEach(([key, val]) => {
    if (val === undefined || val === null) return;
    if (key === "className" || key === "class") element.className = val;
    else if (key === "dataset") Object.assign(element.dataset, val);
    else if (key.startsWith("on") && typeof val === "function") {
      element.addEventListener(key.substring(2).toLowerCase(), val);
    } else if (key === "style" && typeof val === "object") Object.assign(element.style, val);
    else if (key === "disabled") {
      if (val) element.setAttribute("disabled", "");
      else element.removeAttribute("disabled");
    } else element.setAttribute(key, val);
  });
  const childrenArray = Array.isArray(children) ? children : [children];
  childrenArray.forEach((child) => {
    if (!child) return;
    if (typeof child === "string" || typeof child === "number") {
      const str = String(child);
      const trimmed = str.trim();

      if (trimmed.startsWith("<svg") || trimmed.startsWith("<path")) {
        const temp = document.createElement("div");
        temp.innerHTML = str;
        while (temp.firstChild) element.appendChild(temp.firstChild);
      } else {
        element.appendChild(document.createTextNode(str));
      }
    } else {
      element.appendChild(child);
    }
  });
  return element;
};

const ToastManager = (() => {
  const TYPES = {
    success: { icon: "✓", bg: "rgba(34,197,94,.15)", border: "rgba(34,197,94,.35)", text: "rgb(134,239,172)" },
    error: { icon: "✕", bg: "rgba(239,68,68,.15)", border: "rgba(239,68,68,.35)", text: "rgb(252,165,165)" },
    info: { icon: "ℹ", bg: "rgba(59,130,246,.15)", border: "rgba(59,130,246,.35)", text: "rgb(147,197,253)" },
    warn: { icon: "⚠", bg: "rgba(234,179,8,.15)", border: "rgba(234,179,8,.35)", text: "rgb(253,224,71)" },
    neutral: { icon: "·", bg: "rgba(255,255,255,.07)", border: "rgba(255,255,255,.14)", text: "rgba(255,255,255,.8)" },
  };
  const DEFAULT_TIMEOUT = 2000;
  const MAX_STACK = 5;
  const _timers = new Map();
  let _uid = 0;

  function _hub() {
    return document.getElementById("toast-hub");
  }

  function _remove(id) {
    clearTimeout(_timers.get(id));
    _timers.delete(id);
    const node = document.getElementById("toast-" + id);
    if (!node) return;
    node.style.opacity = "0";
    node.style.transform = "translateY(8px) scale(0.96)";
    setTimeout(() => node && node.remove(), 220);
  }

  function show(message, opts = {}) {
    const hub = _hub();
    if (!hub) return;
    const type = TYPES[opts.type] || TYPES.neutral;
    const timeout = opts.timeout ?? DEFAULT_TIMEOUT;
    const id = ++_uid;

    const existing = hub.querySelectorAll(".toast-item");
    if (existing.length >= MAX_STACK) existing[0].remove();

    const node = document.createElement("div");
    node.id = "toast-" + id;
    node.className = "toast-item";
    node.style.cssText = `
      display:flex;align-items:center;gap:7px;
      padding:7px 12px 7px 10px;
      border-radius:8px;
      border:1px solid ${type.border};
      background:${type.bg};
      color:${type.text};
      font-size:11px;font-weight:500;
      backdrop-filter:blur(8px);
      box-shadow:0 4px 16px rgba(0,0,0,.3);
      pointer-events:auto;cursor:default;
      opacity:0;transform:translateY(10px) scale(0.97);
      transition:opacity .18s ease,transform .18s cubic-bezier(.2,.8,.3,1);

    node.innerHTML = `<span style="font-size:12px;opacity:.9">${opts.icon || type.icon}</span><span>${message}</span>`;
    node.onclick = () => _remove(id);

    requestAnimationFrame(() =>
      requestAnimationFrame(() => {
        node.style.opacity = "1";
        node.style.transform = "translateY(0) scale(1)";
      }),

        id,
        setTimeout(() => _remove(id), timeout),

  const warn = (msg, opts) => show(msg, { type: "warn", ...opts });
  const dismiss = (id) => _remove(id);

  return { show, success, error, info, warn, dismiss };

      _carouselData.forEach((_, i) => {
        const dot = document.createElement("button");
        dot.className = CLASSES.dot + (i === _carouselIdx ? ` ${CLASSES.dotActive}` : "");
        dot.addEventListener("click", () => _carouselGoTo(i));
        nav.appendChild(dot);
      });
      const count = document.createElement("span");
      count.className = CLASSES.count;
      count.textContent = `${_carouselIdx + 1} / ${_carouselData.length}`;
      nav.appendChild(count);
      const next = document.createElement("button");
      next.className = CLASSES.arrow;
      next.textContent = "›";
      next.disabled = _carouselIdx === _carouselData.length - 1 && !_carouselOpts.loop;
      next.addEventListener("click", () => {
        const n = _carouselIdx + 1;
        _carouselGoTo(n < _carouselData.length ? n : _carouselOpts.loop ? 0 : _carouselIdx);
      });
      nav.appendChild(next);
      _carouselWrap.appendChild(nav);
    }
  }

  function _carouselGoTo(i) {
    if (i < 0 || i >= _carouselData.length) return;
    _carouselIdx = i;
    _renderCarousel();
  }

  function _destroyCarousel() {
    if (_carouselAutoTimer) {
      clearInterval(_carouselAutoTimer);
      _carouselAutoTimer = null;
    }
    if (_carouselWrap) {
      _carouselWrap.remove();
      _carouselWrap = null;
    }
    _carouselData = [];
    _carouselIdx = 0;
  }

  function carouselDismiss() {
    _destroyCarousel();
  }

  const warn = (msg, o = {}) => show({ type: "warning", message: msg, ...o });
  const error = (msg, o = {}) => show({ type: "error", message: msg, ...o });
  const info = (msg, o = {}) => show({ type: "info", message: msg, ...o });
  const success = (msg, o = {}) => show({ type: "success", message: msg, ...o });

  return { show, remove, clear, has, queue, enqueue, carousel, carouselDismiss, warn, error, info, success };
})();

function toggleSection(id, event) {
  if (event && event.target.closest("button")) return;
  const section = document.getElementById(id);
  if (!section) return;
  const isCollapsed = section.classList.toggle("collapsed");
  const trigger = section.querySelector('[role="button"]');
  if (trigger) trigger.setAttribute("aria-expanded", !isCollapsed);
}

function showSheet(id) {
  const sheet = document.getElementById(id);
  if (!sheet) return;
  sheet.removeAttribute("inert");
  sheet.classList.add("open");
  document.getElementById("overlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function hideSheets() {
  document.querySelectorAll(".bottom-sheet").forEach((s) => {
    s.classList.remove("open");
    s.setAttribute("inert", "");
  });
  document.getElementById("overlay").classList.remove("active");
  document.body.style.overflow = "";
}

function showOverlay(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove("hidden");
}

function hideOverlay(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("hidden");
  if (id === "success-overlay" || id === "error-overlay") hideSheets();
}

function switchSettingsTab(tab) {
  document.querySelectorAll(".settings-tab").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tab));
  document.querySelectorAll(".settings-panel").forEach((panel) => panel.classList.toggle("hidden", panel.dataset.panel !== tab));
}

function createDialogue(targetID, { title = "Are you sure?", body = "", icon = null, buttons = [{ label: t("cancel") }], layout = "row" } = {}) {
  const slot = document.getElementById(targetID);
  if (!slot) return;
  slot.innerHTML = "";

  if (layout === "bottom-sheet") {
    const mkBtn = ({ label, variant = "secondary", id = null, action }) =>
      inputsUI.btn(variant, {
        id,
        label,
        size: "xl",
        class: "w-full",
        onclick: () => {
          hideSheets();
          action?.();
        },
      });

    slot.appendChild(
      el("div", { class: "flex flex-col" }, [

        el("div", { class: "flex justify-center pt-3 pb-1" }, [el("div", { class: "w-9 h-1 rounded-full bg-[var(--border)]" })]),

        el(
          "div",
          { class: "px-5 pt-3 pb-4 border-b border-[var(--border)]" },
          [
            icon ? el("div", { class: "mb-3" }, [icon]) : null,
            el("h2", { class: "text-[17px] font-bold text-[var(--text-primary)]" }, title),
            body ? el("p", { class: "text-[12px] text-[var(--text-muted)] leading-relaxed mt-1" }, body) : null,

        ),

        el("div", { class: "p-4 space-y-2" }, buttons.map(mkBtn)),
      ]),
    );

    document.querySelectorAll(".bottom-sheet").forEach((s) => {
      if (s.id !== targetID) {
        s.classList.remove("open");
        s.setAttribute("inert", "");
      }
    });
    showSheet(targetID);
    return;
  }

  const stacked = layout === "stacked";

  const mkBtn = ({ label, variant = "secondary", id = null, action }) =>
    inputsUI.btn(variant, {
      id,
      label,
      size: stacked ? "xl" : "lg",
      class: stacked ? "w-full" : "flex-1",
      onclick: () => {
        hideOverlay(targetID);
        action?.();
      },
    });

  const btnContainer = el("div", { class: stacked ? "w-full space-y-3" : "flex gap-2 w-full" }, buttons.map(mkBtn));

  const cardCls = "bg-[var(--bg-card)] rounded-[14px] border border-[var(--border)] shadow-xl w-full max-w-[320px]";

  if (stacked) {
    slot.appendChild(
      el("div", { class: cardCls }, [
        el(
          "div",
          { class: "flex flex-col items-center gap-5 p-6 text-center" },

              ].filter(Boolean),
            ),
            btnContainer,
          ].filter(Boolean),
        ),

    slot.appendChild(
      el("div", { class: cardCls }, [

          "div",
          { class: "space-y-4 p-5" },
          [
            el("p", { class: "text-[15px] font-semibold text-[var(--text-primary)] text-left" }, title),
            body ? el("p", { class: "text-[12px] text-[var(--text-muted)] leading-relaxed text-left" }, body) : null,
            btnContainer,
          ].filter(Boolean),
        ),
      ]),
    );
  }

  hideSheets();
  showOverlay(targetID);
}

function _renderThemeShopPreview() {
  const openShop = () => {

function _openSaveVersionSheet() {
  let vName = "",
    vDesc = "";

  createDialogue("dialogue-sheet", {
    layout: "bottom-sheet",
    title: "Save Version",
    body: "Snapshot your current colors, roles, themes and settings.",
    buttons: [
      {
        label: "Save",
        variant: "primary",
        action: () => {
          const name = vName.trim() || "Untitled version";
          const saved = saveVersion(name, vDesc.trim());
          if (saved) {
            if (activeSidebarTab === "project") renderSidebarProject();
            BannerManager.show({ type: "success", message: `Version "${name}" saved.`, autoClose: 2500 });
          }
        },
      },
      { label: t("cancel"), variant: "ghost" },
    ],
  });

  requestAnimationFrame(() => {
    const sheet = document.getElementById("dialogue-sheet");
    if (!sheet) return;
    const bodyBorder = sheet.querySelector(".border-b");
    if (!bodyBorder) return;
    const inputWrap = el("div", { class: "px-4 pb-4 space-y-3" }, [
      panelUI.input({
        placeholder: "e.g. Before dark mode pass",
        label: "Name",
        width: "full",
        size: "lg",
        oninput: (e) => {
          vName = e.target.value;
        },
      }),
      panelUI.input({
        placeholder: "Optional notes…",
        label: "Description",
        width: "full",
        size: "lg",
        oninput: (e) => {
          vDesc = e.target.value;
        },
      }),
    ]);
    bodyBorder.after(inputWrap);
    const firstInput = inputWrap.querySelector("input");
    if (firstInput) setTimeout(() => firstInput.focus(), 80);
  });
}

function _renderVersions() {
  const versions = appState.versions || [];
  const saveTooltip = versionSaveBlockedReason();
  const saveDisabled = !!saveTooltip;

  const header = el("div", { class: "flex items-center justify-between" }, [
    el("p", { class: "text-[11px] font-bold tracking-[0.6px] text-[var(--text-muted)] uppercase" }, ["Versions"]),
    el(
      "button",
      {
        onclick: saveDisabled ? null : _openSaveVersionSheet,
        disabled: saveDisabled,
        "data-tooltip": saveTooltip || "",
        class: `h-[26px] px-2 text-[11px] font-medium rounded-[6px] border border-dashed transition-colors ${saveDisabled ? "text-[var(--text-dim)] border-[var(--border)] opacity-40 cursor-not-allowed" : "text-[var(--accent)] hover:bg-[var(--bg-hover)] border-[var(--border)]"}`,
      },
      ["+ Save"],
    ),
  ]);

  if (versions.length === 0) {
    return el("div", { class: "space-y-2" }, [
      header,
      el("div", { class: "settings-card flex flex-col items-center gap-3 py-6 text-center" }, [
        el("div", { class: "w-10 h-10 rounded-xl bg-[var(--bg-input)] flex items-center justify-center text-[var(--text-muted)] text-[18px]" }, ["🔖"]),
        el("div", { class: "space-y-1" }, [
          el("p", { class: "text-[13px] font-semibold text-[var(--text-primary)]" }, ["No versions yet"]),
          el("p", { class: "text-[11px] text-[var(--text-muted)] leading-relaxed max-w-[220px]" }, [
            'Save snapshots of your setup — colors, roles, themes and all settings — to revisit any earlier state. Click the bookmark icon or "+ Save" anytime.',
          ]),
        ]),
      ]),
    ]);
  }

  const rows = versions.map((v) =>
    el("div", { class: "settings-card flex items-start justify-between gap-3" }, [
      el(
        "div",
        { class: "flex-1 min-w-0" },
        [
          el("p", { class: "text-[13px] font-semibold text-[var(--text-primary)] truncate" }, [v.name]),
          v.description ? el("p", { class: "text-[11px] text-[var(--text-muted)] mt-0.5 leading-relaxed" }, [v.description]) : null,
          el("p", { class: "text-[10px] text-[var(--text-dim)] mt-1" }, [_relativeTime(v.createdAt)]),
        ].filter(Boolean),
      ),
      el("div", { class: "flex gap-1 shrink-0" }, [
        inputsUI.btn("secondary", {
          label: "Restore",
          size: "sm",
          onclick: () => {
            restoreVersion(v._id);
            renderColorGroups();
            renderRoles();
            syncInputsFromState();
            schedulePreview();
            renderSidebarProject();
            BannerManager.show({ type: "success", message: `Restored: "${v.name}"`, autoClose: 2500 });
          },
        }),
        inputsUI.btn("danger", {
          size: "sm",
          square: true,
          icon: Icons.Close,
          onclick: () => {
            deleteVersion(v._id);
            renderSidebarProject();
          },
        }),
      ]),
    ]),
  );

  return el("div", { class: "space-y-2" }, [header, ...rows]);
}

function renderSidebarProject() {
  const container = document.getElementById("sidebar-content-container");
  if (!container) return;
  container.innerHTML = "";

  [_renderProjectProfile(), _renderThemeShopPreview(), _renderVersions()].forEach((node) => node && container.appendChild(node));

  renderSettingsThemes("project-themes-list");
  if (typeof syncVersionButton === "function") syncVersionButton();
}

    <script>/* ui/screens/themeShop.js */
function renderThemeShop() {
  const overlay = document.getElementById("theme-shop-overlay");
  if (!overlay) return;
  overlay.innerHTML = "";

  const header = el(
    "div",
    {
      class: "flex items-center gap-3 px-3 py-3 border-b border-[var(--border)] shrink-0",
    },
    [
      inputsUI.btn("icon", {
        onclick: () => overlay.classList.add("hidden"),
        icon: Icons.ChevronLeft,
        size: "md",
        title: "Back",
      }),
      el("div", {}, [
        el("h2", { class: "text-[15px] font-semibold text-[var(--text-primary)]" }, [t("shop.header.header")]),
        el("p", { class: "text-[11px] text-[var(--text-muted)] mt-0.5" }, [t("shop.header.subHeader")]),
      ]),
    ],
  );
  overlay.appendChild(header);

  const shopList = el("div", {
    class: "p-2 grid grid-cols-1 min-[520px]:grid-cols-2 gap-2 overflow-y-auto flex-1 content-start",
  });
  PRESETS.forEach((preset) => shopList.appendChild(_presetCard(preset)));
  overlay.appendChild(shopList);

  const onKey = (e) => {
    if (e.key === "Escape") {
      overlay.classList.add("hidden");
      document.removeEventListener("keydown", onKey);
    }
  };
  document.addEventListener("keydown", onKey);
}

function _presetCard(preset) {
  const isTW = preset.badge === "TW";
  const isLoaded = appState._presetId && appState._presetId === preset.id;
  return el(
    "div",
    {
      class: `bg-[var(--bg-panel)] rounded-xl border flex flex-col gap-1.5 p-3 ${isLoaded ? "border-[var(--accent)]" : "border-[var(--border)]"}`,
    },
    [

      el("div", { class: "flex items-start justify-between gap-2" }, [
        el("div", {}, [
          el("div", { class: "flex items-center gap-1.5 mb-1" }, [
            isTW
              ? el(
                  "span",
                  {
                    class: "text-[9px] font-bold tracking-widest uppercase px-1.5 py-0.5 rounded bg-[var(--accent)] text-white",
                  },
                  [preset.badge],
                )
              : el(
                  "span",
                  {
                    class: "text-[9px] font-bold tracking-widest uppercase px-1.5 py-0.5 rounded bg-[var(--bg-active)] text-[var(--text-muted)]",
                  },
                  [preset.badge],
                ),
          ]),
          el(
            "p",
            {
              class: "text-[13px] font-semibold text-[var(--text-primary)] leading-tight",
            },
            [preset.name],
          ),
        ]),
        isLoaded
          ? el(
              "div",
              {
                class:
                  "shrink-0 h-[28px] px-3 rounded-[7px] text-[11px] font-semibold flex items-center gap-1 bg-[var(--accent)]/10 border border-[var(--accent)] text-[var(--accent)]",
              },
              [t("loaded")],
            )
          : inputsUI.btn(isTW ? "primary" : "secondary", {
              onclick: () => _loadPreset(preset),
              size: "sm",
              label: t("load"),
              class: "shrink-0 font-semibold",
            }),
      ]),

      _swatchStrip(preset.config.colors),

      el("p", { class: "text-[11px] text-[var(--text-muted)] leading-relaxed" }, [preset.description]),

      el(
        "div",
        { class: "flex flex-wrap gap-1" },
        preset.tags.map((tag) =>
          el(
            "span",
            {
              class: "text-[9px] font-medium px-1.5 py-0.5 rounded-full bg-[var(--bg-input)] text-[var(--text-muted)] border border-[var(--border)]",
            },
            [tag],
          ),
        ),
      ),

      el("div", { class: "flex gap-3 text-[10px] text-[var(--text-dim)]" }, [
        el("span", {}, [`${preset.config.colors.length} colors`]),
        el("span", {}, [`${preset.config.roles.length} roles`]),
        el("span", {}, [`${preset.config.themes.length} themes`]),
      ]),
    ],
  );
}

function _swatchStrip(colors) {
  return el(
    "div",
    { class: "flex gap-1 h-[18px]" },
    colors.map((c) =>
      el("div", {
        class: "flex-1 rounded-[4px]",
        style: `background:#${c.value.replace(/^#/, "")}`,
        title: c.name,
      }),
    ),
  );
}

function _loadPreset(preset) {
  loadState(preset.config);
  appState._presetId = preset.id;
  document.getElementById("theme-shop-overlay").classList.add("hidden");
  hideOverlay("quickstart-overlay");

  if (typeof renderColorGroups === "function") renderColorGroups();
  if (typeof renderRoles === "function") renderRoles();
  if (typeof renderSidebarProject === "function") renderSidebarProject();
  if (typeof syncInputsFromState === "function") syncInputsFromState();

  if (typeof switchSidebarTab === "function") switchSidebarTab("color-groups");

  BannerManager.show({
    type: "success",
    message: `"${preset.name}" loaded — everything is editable.`,
    autoClose: 3000,
  });
}
</script>

const PILL_COLORS = ["#7c3aed", "#0891b2", "#ea580c", "#15803d", "#be123c", "#d97706", "#1d4ed8", "#a21caf"];
const PILL_LABELS = { color: "Color", role: "Role", variation: "Variation" };
const _pillColorCache = {};

function _pillColor(segment) {
  if (!_pillColorCache[segment]) {
    const taken = Object.keys(_pillColorCache).length;
    _pillColorCache[segment] = PILL_COLORS[taken % PILL_COLORS.length];
  }
  return _pillColorCache[segment];
}

let _pillDragSrc = null;

function renderTokenOrderPills() {
  const container = document.getElementById("token-order-pills");
  if (!container) return;
  const order = appState.tokenNameSegments || ["color", "role", "variation"];
  container.innerHTML = "";

  order.forEach((segment, idx) => {
    const c = _pillColor(segment);
    const pill = document.createElement("span");
    pill.textContent = PILL_LABELS[segment] || segment;
    pill.draggable = true;
    pill.dataset.segment = segment;
    pill.style.cssText = `background:${c};color:#fff;padding:4px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:grab;user-select:none;transition:opacity .15s,box-shadow .15s;outline:none;box-shadow:0 2px 8px ${c}55`;

    pill.addEventListener("dragstart", () => {
      _pillDragSrc = idx;
      pill.style.opacity = "0.4";
    });
    pill.addEventListener("dragend", () => {
      _pillDragSrc = null;
      pill.style.opacity = "1";
    });
    pill.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (_pillDragSrc !== null && _pillDragSrc !== idx) pill.style.boxShadow = `0 0 0 2px #fff8`;
    });
    pill.addEventListener("dragleave", () => {
      pill.style.boxShadow = `0 2px 8px ${c}55`;
    });
    pill.addEventListener("drop", (e) => {
      e.preventDefault();
      if (_pillDragSrc === null || _pillDragSrc === idx) return;
      const newOrder = [...order];
      const [moved] = newOrder.splice(_pillDragSrc, 1);
      newOrder.splice(idx, 0, moved);
      setTokenNameSegments(newOrder);
    });

    container.appendChild(pill);
    if (idx < order.length - 1) {
      const sep = document.createElement("span");
      sep.textContent = "/";
      sep.style.cssText = "color:var(--text-muted);font-size:13px;font-weight:700;opacity:0.35;user-select:none;pointer-events:none";
      container.appendChild(sep);
    }
  });

  _syncNameFormatPreview();
}

    class: "absolute inset-0 opacity-0 w-full h-full cursor-pointer z-10",
    title: "Click to edit color",
    oninput: (e) => {
      const clean = e.target.value.replace("#", "").toUpperCase();
      if (colorIdx >= 0) {

function _pvAlphaTintStrip(color, alphaInts) {
  const hex = "#" + color.value.replace(/^#/, "").toUpperCase().padEnd(6, "0");
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const swatches = alphaInts.map((opacity) => {
    const a = (opacity / 100).toFixed(2);
    const rgbaStr = `rgba(${r},${g},${b},${a})`;
    return el("div", {
      class: "flex-1 h-6 rounded cursor-pointer",
      style: `background:${rgbaStr};box-shadow:inset 0 0 0 1px rgba(128,128,128,.2)`,
      title: `${color.name} ${opacity}%\n${rgbaStr}`,
      onclick: () => {
        copyToClipboard(rgbaStr);
        ToastManager.success(`Copied ${rgbaStr}`);
      },
    });
  });
  return el("div", { class: "flex gap-0.5 items-center mb-1.5" }, [
    el("div", { class: "w-16 text-[11px] text-[var(--text-muted)] truncate shrink-0", title: color.name }, color.name),
    ...swatches,
  ]);
}

};

const _pvState = {
  groupBy: "color", // "color" | "role"
  viewMode: "grid", // "grid"  | "table"
};

function _pvVarLabel(varKey) {
  const i = parseInt(varKey);
  if (!isNaN(i) && appState.variations && appState.variations[i]) {
    return appState.variations[i].name || appState.variations[i].shorthand;
  }
  return varKey;
}

function _pvTokenTile(token, varLabel, ink) {
  const rMeta = _PV_RATING[token.contrast?.rating] || _PV_RATING["Fail"];
  const ratio = typeof token.contrast?.ratio === "number" ? token.contrast.ratio.toFixed(1) : "—";
  const swatchInk = useWhiteLabel(token.value) ? "255,255,255" : "0,0,0";
  const swatchInkStr = `rgb(${swatchInk})`;

  const ratingPill = el(
    "div",
    {
      style: [
        `background:${rMeta.bg}`,
        `color:${rMeta.fg}`,
        "font-size:9px",
        "font-weight:800",
        "letter-spacing:0.07em",
        "padding:2px 6px",
        "border-radius:5px",
        "line-height:1.5",
        "white-space:nowrap",
      ].join(";"),
    },
    rMeta.label,
  );

  const ratioEl = el(
    "div",
    {
      style: "display:flex;align-items:baseline;gap:2px",
    },
    [
      el(
        "span",
        {
          style: [
            "font-size:20px",
            "font-weight:800",
            "font-variant-numeric:tabular-nums",
            "line-height:1",
            `color:${swatchInkStr}`,
            "text-shadow:0 1px 4px rgba(0,0,0,0.20)",
          ].join(";"),
        },
        ratio,
      ),
      el(
        "span",
        {
          style: ["font-size:10px", "font-weight:700", "opacity:0.7", `color:${swatchInkStr}`, "margin-bottom:1px"].join(";"),
        },
        ":1",
      ),
    ],
  );

  const hexOverlay = el(
    "div",
    {
      style: [
        "position:absolute",
        "inset:0",
        "display:flex",
        "align-items:center",
        "justify-content:center",
        "border-radius:10px 10px 0 0",
        "opacity:0",
        "transition:opacity 0.15s ease",
        "pointer-events:none",
        "background:rgba(0,0,0,0.18)",
      ].join(";"),
    },
    [
      el(
        "span",
        {
          style: [
            "font-size:12px",
            "font-family:ui-monospace,SFMono-Regular,Menlo,monospace",
            "font-weight:700",
            "color:#fff",
            "letter-spacing:0.06em",
            "text-shadow:0 1px 4px rgba(0,0,0,0.5)",
          ].join(";"),
        },
        token.value.toUpperCase(),
      ),
    ],
  );

  const swatch = el(
    "div",
    {
      style: [
        `background:${token.value}`,
        "height:72px",
        "border-radius:10px 10px 0 0",
        "position:relative",
        "padding:6px",
        "display:flex",
        "flex-direction:column",
        "justify-content:space-between",
        "cursor:pointer",
        "overflow:hidden",
        "transition:transform 0.12s ease,box-shadow 0.12s ease",
      ].join(";"),
      title: `${token.value.toUpperCase()} — click to copy hex`,
      onclick: () => {
        copyToClipboard(token.value);
        ToastManager.success(`Copied ${token.value.toUpperCase()}`);
      },
      onmouseenter: (e) => {
        e.currentTarget.style.transform = "scale(1.03)";
        e.currentTarget.style.boxShadow = `0 8px 24px rgba(${swatchInk},0.25)`;
        hexOverlay.style.opacity = "1";
      },
      onmouseleave: (e) => {
        e.currentTarget.style.transform = "";
        e.currentTarget.style.boxShadow = "";
        hexOverlay.style.opacity = "0";
      },
    },
    [el("div", { style: "display:flex;justify-content:flex-end" }, [ratingPill]), ratioEl, hexOverlay],
  );

  const varLine = el(
    "div",
    {
      style: [
        "font-size:11px",
        "font-weight:600",
        `color:rgba(${ink},0.80)`,
        "line-height:1.2",
        "white-space:nowrap",
        "overflow:hidden",
        "text-overflow:ellipsis",
      ].join(";"),
    },
    varLabel,
  );

  const tokenNameEl = token.tokenName
    ? el(
        "div",
        {
          style: [
            "font-size:9px",
            `color:rgba(${ink},0.40)`,
            "letter-spacing:0.03em",
            "line-height:1.3",
            "overflow:hidden",
            "text-overflow:ellipsis",
            "white-space:nowrap",
          ].join(";"),
        },
        token.tokenName,
      )
    : null;

  const footerChildren = [varLine];
  if (tokenNameEl) footerChildren.push(tokenNameEl);

  const footer = el(
    "div",
    {
      style: [
        "padding:6px 8px 8px",
        "display:flex",
        "flex-direction:column",

      ].join(";"),

      onclick: token.tokenName

            copyToClipboard(token.tokenName);
            ToastManager.success(`Copied ${token.tokenName}`);
          }
        : undefined,
      onmouseenter: token.tokenName

            e.currentTarget.style.background = `rgba(${ink},0.09)`;

        : undefined,
      onmouseleave: token.tokenName

            e.currentTarget.style.background = `rgba(${ink},0.04)`;

  return el("div", { style: "display:flex;flex-direction:column;min-width:0" }, [swatch, footer]);

function _pvRoleBlock(roleIdx, variations, ink) {
  const role = appState.roles[roleIdx];
  const rName = (role && role.name) || `Role ${roleIdx}`;
  const scopeLabel = role && role.scope && role.scope !== "all" ? role.scope : null;

  const headerChildren = [
    el(
      "div",
      {
        style: [
          "font-size:12px",
          "font-weight:700",
          `color:rgba(${ink},0.90)`,
          "letter-spacing:0.01em",
          "white-space:nowrap",
          "overflow:hidden",
          "text-overflow:ellipsis",
        ].join(";"),
      },
      rName,
    ),
  ];
  if (scopeLabel) {
    headerChildren.push(
      el(
        "div",
        {
          style: [
            "font-size:9px",
            "font-weight:700",
            "letter-spacing:0.08em",
            "text-transform:uppercase",
            `color:rgba(${ink},0.45)`,
            `border:1px solid rgba(${ink},0.18)`,
            "border-radius:4px",
            "padding:1px 5px",
            "line-height:1.5",
            "white-space:nowrap",
          ].join(";"),
        },
        scopeLabel,
      ),
    );
  }

  const grid = el("div", {
    style: "display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px",
  });
  for (const [varKey, token] of Object.entries(variations)) {
    grid.appendChild(_pvTokenTile(token, _pvVarLabel(varKey), ink));
  }

  return el("div", { style: "display:flex;flex-direction:column;gap:8px" }, [
    el("div", { style: "display:flex;align-items:center;gap:6px;min-width:0" }, headerChildren),
    grid,
  ]);
}

function _pvColorSection(colorName, roles, ink) {
  const colorEntry = appState.colors.find((c) => c.name === colorName);
  const swatchHex = colorEntry ? "#" + colorEntry.value.replace(/^#/, "") : "#888888";

  const header = el(
    "div",
    {
      style: "display:flex;align-items:center;gap:8px;margin-bottom:12px",
    },
    [
      el("div", {
        style: [`background:${swatchHex}`, "width:12px", "height:12px", "border-radius:3px", "flex-shrink:0", `box-shadow:0 0 0 1px rgba(${ink},0.12)`].join(
          ";",
        ),
      }),
      el(
        "div",
        {
          style: ["font-size:13px", "font-weight:700", `color:rgba(${ink},1)`, "letter-spacing:0.005em"].join(";"),
        },
        colorName,
      ),
    ],
  );

  const rolesEl = el("div", { style: "display:flex;flex-direction:column;gap:16px" });
  for (const [roleIdx, variations] of Object.entries(roles)) {
    rolesEl.appendChild(_pvRoleBlock(roleIdx, variations, ink));
  }

  return el(
    "div",
    {
      style: [`border:1px solid rgba(${ink},0.10)`, "border-radius:14px", "padding:16px", `background:rgba(${ink},0.03)`].join(";"),
    },
    [header, rolesEl],
  );
}

function _pvRegroupByRole(themeTokens) {
  const out = {};
  for (const [colorName, roles] of Object.entries(themeTokens)) {
    for (const [roleIdx, variations] of Object.entries(roles)) {
      if (!out[roleIdx]) out[roleIdx] = {};
      out[roleIdx][colorName] = variations;
    }
  }
  return out; // { roleIdx: { colorName: { varKey: token } } }
}

function _pvTableSection(sectionName, subsections, ink) {
  const colorEntry = appState.colors.find((c) => c.name === sectionName);
  const sectionHex = colorEntry ? "#" + colorEntry.value.replace(/^#/, "") : null;

  const hdrBg = sectionHex || `rgba(${ink},0.08)`;
  const hdrInk = sectionHex ? (useWhiteLabel(sectionHex) ? "255,255,255" : "0,0,0") : ink;

  const COL = ["minmax(80px,1fr)", "64px", "64px", "56px", "minmax(120px,2fr)"];
  const gridStyle = `display:grid;grid-template-columns:${COL.join(" ")};align-items:center`;

  function hdrCell(text, style = "") {
    return el(
      "div",
      {
        style: [
          "font-size:10px",
          "font-weight:700",
          "letter-spacing:0.07em",
          "text-transform:uppercase",
          `color:rgba(${hdrInk},0.75)`,
          "padding:0 8px",
          "overflow:hidden",
          "text-overflow:ellipsis",
          "white-space:nowrap",
          style,
        ]
          .filter(Boolean)
          .join(";"),
      },
      text,
    );
  }

  function dataCell(children, style = "") {
    return el(
      "div",
      {
        style: ["padding:0 8px", "overflow:hidden", "min-width:0", style].filter(Boolean).join(";"),
      },
      Array.isArray(children) ? children : [children],
    );
  }

  const rows = [];

  rows.push(
    el(
      "div",
      {
        style: [gridStyle, `background:${hdrBg}`, "height:32px", "border-radius:8px 8px 0 0", "position:sticky", "top:0", "z-index:2"].join(";"),
      },
      [
        hdrCell(sectionName, "font-size:11px;font-weight:800;letter-spacing:0.02em"),
        hdrCell("Hex"),
        hdrCell("Ratio"),
        hdrCell("Rating"),
        hdrCell("Token Name"),
      ],
    ),
  );

  let firstSubsection = true;
  for (const [subKey, variations] of Object.entries(subsections)) {

    const isRoleKey = _pvState.groupBy === "color";
    const subName = isRoleKey ? (appState.roles[subKey] && appState.roles[subKey].name) || `Role ${subKey}` : subKey;

    rows.push(
      el(
        "div",
        {
          style: [gridStyle, `background:rgba(${ink},0.05)`, "height:26px", !firstSubsection ? `border-top:1px solid rgba(${ink},0.08)` : ""]
            .filter(Boolean)
            .join(";"),
        },
        [
          el(
            "div",
            {
              style: [
                "padding:0 8px 0 16px",
                "font-size:10px",
                "font-weight:700",
                "letter-spacing:0.06em",
                "text-transform:uppercase",
                `color:rgba(${ink},0.50)`,
                "grid-column:1/-1",
                "overflow:hidden",
                "text-overflow:ellipsis",
                "white-space:nowrap",
              ].join(";"),
            },
            subName,
          ),
        ],
      ),
    );
    firstSubsection = false;

    for (const [varKey, token] of Object.entries(variations)) {
      const varLabel = _pvVarLabel(varKey);
      const rMeta = _PV_RATING[token.contrast?.rating] || _PV_RATING["Fail"];
      const ratio = typeof token.contrast?.ratio === "number" ? token.contrast.ratio.toFixed(1) : "—";

      const swatchDot = el("div", {
        style: [`background:${token.value}`, "width:14px", "height:14px", "border-radius:3px", "flex-shrink:0", `box-shadow:0 0 0 1px rgba(${ink},0.12)`].join(
          ";",
        ),
      });

      const row = el(
        "div",
        {
          style: [gridStyle, "height:36px", `border-top:1px solid rgba(${ink},0.06)`, "cursor:pointer", "transition:background 0.1s ease"].join(";"),
          title: `${token.value.toUpperCase()} — click to copy hex`,
          onclick: () => {
            copyToClipboard(token.value);
            ToastManager.success(`Copied ${token.value.toUpperCase()}`);
          },
          onmouseenter: (e) => {
            e.currentTarget.style.background = `rgba(${ink},0.04)`;
          },
          onmouseleave: (e) => {
            e.currentTarget.style.background = "";
          },
        },
        [

          dataCell([
            el("div", { style: "display:flex;align-items:center;gap:6px" }, [
              swatchDot,
              el(
                "span",
                {
                  style: [
                    "font-size:11px",
                    "font-weight:600",
                    `color:rgba(${ink},0.85)`,
                    "overflow:hidden",
                    "text-overflow:ellipsis",
                    "white-space:nowrap",
                  ].join(";"),
                },
                varLabel,
              ),
            ]),
          ]),

          dataCell(
            el(
              "span",
              {
                style: [
                  "font-size:10px",
                  "font-family:ui-monospace,SFMono-Regular,Menlo,monospace",
                  "font-weight:600",
                  `color:${token.value}`,
                  "letter-spacing:0.04em",
                  "cursor:pointer",
                ].join(";"),
                onclick: (e) => {
                  e.stopPropagation();
                  copyToClipboard(token.value);
                  ToastManager.success(`Copied ${token.value.toUpperCase()}`);
                },
              },
              token.value.toUpperCase(),
            ),
          ),

          dataCell(
            el(
              "span",
              {
                style: ["font-size:12px", "font-weight:700", "font-variant-numeric:tabular-nums", `color:rgba(${ink},0.80)`].join(";"),
              },
              ratio,
            ),
          ),

          dataCell(
            el(
              "span",
              {
                style: [
                  `background:${rMeta.bg}`,
                  `color:${rMeta.fg}`,
                  "font-size:9px",
                  "font-weight:800",
                  "letter-spacing:0.07em",
                  "padding:2px 6px",
                  "border-radius:5px",
                  "line-height:1.5",
                  "white-space:nowrap",
                  "display:inline-block",
                ].join(";"),
              },
              rMeta.label,
            ),
          ),

          dataCell(
            token.tokenName
              ? el(
                  "span",
                  {
                    style: [
                      "font-size:10px",
                      "font-family:ui-monospace,SFMono-Regular,Menlo,monospace",
                      `color:rgba(${ink},0.45)`,
                      "overflow:hidden",
                      "text-overflow:ellipsis",
                      "white-space:nowrap",
                      "display:block",
                      "cursor:pointer",
                    ].join(";"),
                    title: `${token.tokenName} — click to copy`,
                    onclick: (e) => {
                      e.stopPropagation();
                      copyToClipboard(token.tokenName);
                      ToastManager.success(`Copied ${token.tokenName}`);
                    },
                  },
                  token.tokenName,
                )
              : el("span", { style: `color:rgba(${ink},0.20);font-size:10px` }, "—"),
          ),
        ],
      );

      rows.push(row);
    }
  }

  return el(
    "div",
    {
      style: [`border:1px solid rgba(${ink},0.10)`, "border-radius:10px", "overflow:hidden"].join(";"),
    },
    rows,
  );
}

const schedulePreview = debounce(() => {
  if (document.getElementById("preview-screen").classList.contains("hidden")) return;
  try {
    const result = variableMaker(translateConfig(appState));
    renderPreviewPanel(result);
  } catch (err) {
    console.error("Preview render failed:", err);
  }
}, 500);

function renderPreviewPanel(result) {
  const themes = appState.themes || [];

  const colorEl = document.getElementById("preview-colors");
  colorEl.innerHTML = "";
  if (Object.keys(result.scales).length === 0) {
    colorEl.innerHTML = `<p class="text-[12px] text-[var(--text-muted)] px-1 py-4 text-center">No scale in Direct mode. Colors are solved directly per variation target.</p>`;
  } else {
    const themeKeys = themes.map((t) => t.name.toLowerCase());
    for (const [colorName, scale] of Object.entries(result.scales)) {
      const colorEntry = appState.colors.find((c) => c.name === colorName);
      const colorIdx = appState.colors.findIndex((c) => c.name === colorName);
      const srcHex = "#" + (colorEntry ? colorEntry.value.replace(/^#/, "") : "888888");
      colorEl.appendChild(_pvColorScaleRow(colorName, colorIdx, srcHex, scale, themeKeys));
    }
  }

  if (appState.includeAlphaTints && appState.includeSourceColors) {
    const alphaInts = (appState.alphaValues || "10, 25, 50, 75, 90")
      .split(",")
      .map((v) => parseInt(v.trim()))
      .filter((v) => !isNaN(v));
    if (alphaInts.length > 0) {
      colorEl.appendChild(
        el("div", { class: "mb-4 mt-1" }, [
          el("div", { class: "text-[11px] font-bold tracking-[0.1em] uppercase text-[var(--text-muted)] mb-2 px-1" }, "Alpha Tints"),
          ...appState.colors.map((color) => _pvAlphaTintStrip(color, alphaInts)),
        ]),
      );
    }
  }

  const panelArea = document.getElementById("preview-theme-panels");
  if (!panelArea) return;

  let toolbar = document.getElementById("preview-theme-toolbar");
  if (!toolbar) {
    toolbar = document.createElement("div");
    toolbar.id = "preview-theme-toolbar";
    toolbar.style.cssText = ["display:none", "align-items:center", "gap:12px", "padding:0 4px 10px", "flex-wrap:wrap"].join(";");
    panelArea.parentNode.insertBefore(toolbar, panelArea);
  }
  toolbar.innerHTML = "";

  function _pvSegBtn(label, active, onclick) {
    const btn = document.createElement("button");
    btn.textContent = label;
    btn.style.cssText = [
      "font-size:11px",
      "font-weight:600",
      "padding:3px 10px",
      "border-radius:6px",
      "border:none",
      "cursor:pointer",
      "transition:all 0.12s",
      active ? "background:var(--accent);color:#fff" : "background:var(--bg-input);color:var(--text-muted)",
    ].join(";");
    btn.onclick = onclick;
    return btn;
  }

  function _pvLabel(text) {
    const s = document.createElement("span");
    s.textContent = text;
    s.style.cssText = "font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap";
    return s;
  }

  function repaintPanels() {
    panelArea.querySelectorAll(".preview-theme-panel").forEach((p) => {
      const themeI = parseInt(p.dataset.themeIdx);
      const theme = (appState.themes || [])[themeI];
      if (!theme) return;
      renderThemePanel(p, result.tokens[theme.name.toLowerCase()] || {}, normalizeHex(theme.bg) || "#FFFFFF");
    });
  }

  const grpColor = _pvSegBtn("Color", _pvState.groupBy === "color", () => {
    _pvState.groupBy = "color";
    grpColor.style.background = "var(--accent)";
    grpColor.style.color = "#fff";
    grpRole.style.background = "var(--bg-input)";
    grpRole.style.color = "var(--text-muted)";
    repaintPanels();
  });
  const grpRole = _pvSegBtn("Role", _pvState.groupBy === "role", () => {
    _pvState.groupBy = "role";
    grpRole.style.background = "var(--accent)";
    grpRole.style.color = "#fff";
    grpColor.style.background = "var(--bg-input)";
    grpColor.style.color = "var(--text-muted)";
    repaintPanels();
  });

  const vmGrid = _pvSegBtn("Grid", _pvState.viewMode === "grid", () => {
    _pvState.viewMode = "grid";
    vmGrid.style.background = "var(--accent)";
    vmGrid.style.color = "#fff";
    vmTable.style.background = "var(--bg-input)";
    vmTable.style.color = "var(--text-muted)";
    repaintPanels();
  });
  const vmTable = _pvSegBtn("Table", _pvState.viewMode === "table", () => {
    _pvState.viewMode = "table";
    vmTable.style.background = "var(--accent)";
    vmTable.style.color = "#fff";
    vmGrid.style.background = "var(--bg-input)";
    vmGrid.style.color = "var(--text-muted)";
    repaintPanels();
  });

  const grpWrap = document.createElement("div");
  grpWrap.style.cssText = "display:flex;align-items:center;gap:3px";
  grpWrap.append(_pvLabel("Group"), document.createTextNode("  "), grpColor, grpRole);

  const vmWrap = document.createElement("div");
  vmWrap.style.cssText = "display:flex;align-items:center;gap:3px";
  vmWrap.append(_pvLabel("View"), document.createTextNode("  "), vmGrid, vmTable);

  toolbar.append(grpWrap, vmWrap);

  themes.forEach((theme, i) => {
    let panel = panelArea.querySelector(`[data-theme-idx="${i}"]`);
    if (!panel) {
      panel = document.createElement("div");
      panel.className = "preview-panel preview-theme-panel";
      panel.dataset.themeIdx = i;
      panelArea.appendChild(panel);
    }
    panel.id = `preview-theme-panel-${i}`;
    renderThemePanel(panel, result.tokens[theme.name.toLowerCase()] || {}, normalizeHex(theme.bg) || "#FFFFFF");
  });

  panelArea.querySelectorAll(".preview-theme-panel").forEach((p) => {
    if (parseInt(p.dataset.themeIdx) >= themes.length) {
      if (p.classList.contains("active")) {
        const firstTab = document.querySelector("#preview-screen .preview-tab-btn:not(.hidden)");
        document.querySelectorAll("#preview-screen .preview-tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll("#preview-content .preview-panel, #preview-theme-panels > div").forEach((q) => q.classList.remove("active"));
        if (firstTab) {
          firstTab.classList.add("active");
          const fallback = document.getElementById(firstTab.dataset.target);
          if (fallback) fallback.classList.add("active");
        }
        syncPreviewBackground();
      }
      p.remove();
    }
  });
}

function renderThemePanel(panelOrId, themeTokens, bgHex) {
  const panelEl = typeof panelOrId === "string" ? document.getElementById(panelOrId) : panelOrId;
  panelEl.innerHTML = "";
  panelEl.dataset.bg = bgHex || "";
  panelEl.style.backgroundColor = "transparent";

  const ink = useWhiteLabel(bgHex || "#FFFFFF") ? "255,255,255" : "0,0,0";
  panelEl.style.setProperty("--pv-ink", ink);
  panelEl.style.setProperty("--pv-text", `rgb(${ink})`);
  panelEl.style.setProperty("--pv-muted", `rgba(${ink},0.55)`);

  const inner = el("div", {

          const cEntry = appState.colors.find((c) => c.name === colorName);
          const cHex = cEntry ? "#" + cEntry.value.replace(/^#/, "") : "#888888";
          const subHeader = el(
            "div",
            {
              style: "display:flex;align-items:center;gap:6px;min-width:0;margin-bottom:8px",
            },
            [
              el("div", {
                style: [`background:${cHex}`, "width:10px", "height:10px", "border-radius:2px", "flex-shrink:0", `box-shadow:0 0 0 1px rgba(${ink},0.12)`].join(
                  ";",

              el(
                "div",
                {
                  style: `font-size:11px;font-weight:700;color:rgba(${ink},0.70)`,
                },
                colorName,
              ),
            ],
          );
          const grid = el("div", {
            style: "display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px",
          });
          for (const [varKey, token] of Object.entries(variations)) {
            grid.appendChild(_pvTokenTile(token, _pvVarLabel(varKey), ink));

          colorsEl.appendChild(el("div", {}, [subHeader, grid]));

        inner.appendChild(

              style: [`border:1px solid rgba(${ink},0.10)`, "border-radius:14px", "padding:16px", `background:rgba(${ink},0.03)`].join(";"),
            },
            [roleHeader, colorsEl],
          ),
        );
      }
    }
  } else {

    for (const [colorName, roles] of Object.entries(themeTokens)) {
      if (isTable) {
        inner.appendChild(_pvTableSection(colorName, roles, ink));
      } else {
        inner.appendChild(_pvColorSection(colorName, roles, ink));
      }
    }
  }

  panelEl.appendChild(inner);
  if (panelEl.classList.contains("active")) {
    syncPreviewBackground();
  }

function _pvRoleName(roleIdx) {
  return (appState.roles[roleIdx] && appState.roles[roleIdx].name) || `Role ${roleIdx}`;
}

function renderPreviewTabs() {
  const tabBar = document.querySelector("#preview-screen .sidebar-tabs");
  if (!tabBar) return;
  tabBar.querySelectorAll(".preview-theme-tab").forEach((b) => b.remove());

  const isDirect = appState.pluginMode === "direct";
  const paletteTab = tabBar.querySelector("[data-target='preview-colors']");
  if (paletteTab) paletteTab.classList.toggle("hidden", isDirect);

  const themes = appState.themes || [];

function syncPreviewBackground() {
  const contentEl = document.getElementById("preview-content");
  if (!contentEl) return;

  if (activePanel && activePanel.dataset.bg) {
    contentEl.style.backgroundColor = activePanel.dataset.bg;
  } else {
    contentEl.style.backgroundColor = "";
  }
}

function renderLabPreview() {

  if (!overlay) return;

  let result;
  try {
    result = variableMaker(translateConfig(appState));
  } catch (err) {
    overlay.innerHTML = `<div style="padding:32px;color:var(--text-muted);font-size:13px">Preview error: ${err.message}</div>`;

  const themes = appState.themes || [];
  overlay.innerHTML = "";

  const header = el("div", {
    style: [
      "display:flex",
      "align-items:center",
      "justify-content:space-between",
      "padding:0 16px",
      "height:52px",

      "background:var(--bg-app)",
      "flex-shrink:0",
    ].join(";"),
  }, [
    el("div", { style: "display:flex;align-items:center;gap:8px" }, [
      el("span", { style: "font-size:16px" }, "⚗"),
      el("div", { style: "font-size:14px;font-weight:700;color:var(--text-primary)" }, "Design Lab"),
      el("div", {
        style: [
          "font-size:10px","font-weight:700","letter-spacing:0.08em","text-transform:uppercase",
          "color:var(--accent)","background:rgba(var(--accent-rgb,99,102,241),0.12)",
          "border-radius:4px","padding:2px 6px",
        ].join(";"),
      }, "Beta"),
    ]),
    el("button", {
      style: [
        "font-size:12px","font-weight:600","padding:5px 12px",
        "border-radius:8px","border:1px solid var(--border)",
        "background:var(--bg-input)","color:var(--text-muted)","cursor:pointer",
      ].join(";"),
      onclick: () => hideOverlay("design-lab-overlay"),
    }, "Close"),
  ]);

  overlay.appendChild(header);

  if (themes.length === 0) {
    overlay.appendChild(el("div", {
      style: "padding:48px;text-align:center;color:var(--text-muted);font-size:13px",
    }, "Add a theme in Settings to preview tokens here."));
    return;
  }

  if (_labState.activeTheme >= themes.length) _labState.activeTheme = 0;

  function rebuild() {

    while (overlay.children.length > 1) overlay.lastChild.remove();
    renderLabBody();
  }

  function renderLabBody() {
    const toolbar   = _labToolbar(rebuild);
    const tabBar    = _labThemeTabBar(themes, rebuild);
    overlay.appendChild(toolbar);
    overlay.appendChild(tabBar);

    const theme   = themes[_labState.activeTheme];
    const bgHex   = normalizeHex(theme.bg) || "#FFFFFF";
    const inkRgb  = useWhiteLabel(bgHex) ? "255,255,255" : "0,0,0";
    const tokens  = result.tokens[theme.name.toLowerCase()] || {};

    overlay.appendChild(_labThemeCanvas(tokens, bgHex, inkRgb, result));
  }

  renderLabBody();
}

    <script>/* shared/exportEng/helpers.js */
function _colorLabel(colorName, config) {
  if (!config.useShorthandColors) return colorName;
  for (var i = 0; i < config.colors.length; i++) {
    if (config.colors[i].name === colorName && config.colors[i].shorthand)
      return config.colors[i].shorthand;
  }
  return colorName;
}

function _roleLabel(roleObj, config) {
  if (!config.useShorthandRoles) return roleObj.name;
  return (roleObj && roleObj.shorthand) ? roleObj.shorthand : roleObj.name;
}

function _varLabel(varDef, config) {
  if (!config.useShorthandVariations) return varDef.name;
  return (varDef && varDef.shorthand) ? varDef.shorthand : varDef.name;
}

function _stepLabel(stepName, config) {
  if (!config.useShorthandSteps) return stepName;
  var sh = config.scaleStepShorthands && config.scaleStepShorthands[stepName];
  return sh ? sh : stepName;
}

function _tokenSegments(colorLabel, roleLabel, varLabel, config) {
  var order = config.tokenNameSegments || ["color", "role", "variation"];
  var parts = { color: colorLabel, role: roleLabel, variation: varLabel };
  var out = [];
  for (var i = 0; i < order.length; i++) {
    var p = parts[order[i]];
    if (p) out.push(p);
  }
  return out;
}

function _variationDefs(roleObj, config) {
  return (roleObj.customVariationList && roleObj.customVariations && roleObj.customVariations.length > 0)
    ? roleObj.customVariations
    : config.variations;
}

function _slug(str) {
  if (!str) return "";
  return String(str).toLowerCase().trim()
    .replace(/[\s_]+/g, "-")
    .replace(/[^a-z0-9-]/g, "");
}

function _camel(parts) {

    <script>/* shared/exportEng/zipBuilder.js */
function buildAndDownloadZip(projectName, files) {
  if (typeof JSZip === "undefined") {
    BannerManager.error("ZIP library not loaded — please reload the plugin.");
    return;
  }
  var zip = new JSZip();
  var folderSlug = (projectName || "token-wand")
    .toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
  var root = zip.folder(folderSlug);

  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var parts = f.path.split("/");
    var fileName = parts.pop();
    var dir = root;
    for (var j = 0; j < parts.length; j++) {
      dir = dir.folder(parts[j]);
    }
    dir.file(fileName, f.content);
  }

  zip.generateAsync({ type: "blob" }).then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = folderSlug + "-tokens.zip";
    a.click();
    URL.revokeObjectURL(url);
  });
}
