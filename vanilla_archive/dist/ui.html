function _buildImportWarningIcon() {
  return el("div", { class: "w-20 h-20 bg-[var(--warning)]/10 rounded-full flex items-center justify-center text-[var(--warning)]" }, [Icons.AlertTriangle]);
}

function _proceedToCollectionCheck(scope) {
  pendingScope = scope;
  parent.postMessage(
    {
      pluginMessage: {
        type: "check-collections",
        colorName: appState.scaleCollectionName || "_scale",
        tokenColName: appState.tokenCollectionName || "color tokens",
        state: appState,
        savedState: getSavedState(),
      },
    },
    "*",
  );
}

function handleSubmit(scope = "all") {
  const issues = validateState();
  if (issues) {
    renderValidationWarningDialog(issues, () => _proceedToCollectionCheck(scope));
    showOverlay("error-overlay");
    return;
  }
  _proceedToCollectionCheck(scope);
}

function proceedWithSync() {
  renderLoadingOverlay();
  showOverlay("loading-overlay");
  setTimeout(() => {
    parent.postMessage({ pluginMessage: { type: "run-creator", state: appState, scope: pendingScope, savedState: getSavedState() } }, "*");
  }, 50);
}

function setRunScope(scope) {
  pendingScope = scope;
  ["all", "groups", "roles"].forEach((s) => {
    const btn = document.getElementById("rd-scope-" + s);
    if (btn) btn.classList.toggle("active", s === scope);
  });
  refreshRunDialog();
}

function refreshRunDialog() {
  const existing = lastCollectionCheckResult;
  const colorName = appState.scaleCollectionName || "_scale";
  const tokenColName = appState.tokenCollectionName || "color tokens";
  const isDirect = isDirectMode();
  const skipScales = appState.resolveTokensDirectly || isDirect || appState.includeColorScalesCollection === false;
  const tg = appState.tokenGrouping || "color";
  const shortC = appState.useShorthandColors;
  const shortR = appState.useShorthandRoles;
  const scope = pendingScope || "all";

  const rdToggleKeys = [
    ["rd-toggle-resolveTokensDirectly", "resolveTokensDirectly"],
    ["rd-toggle-useShorthandColors", "useShorthandColors"],
    ["rd-toggle-useShorthandRoles", "useShorthandRoles"],
    ["rd-toggle-useShorthandVariations", "useShorthandVariations"],
    ["rd-toggle-useShorthandSteps", "useShorthandSteps"],
  ];
  rdToggleKeys.forEach(function (pair) {
    var btn = document.getElementById(pair[0]);
    if (btn) btn.classList.toggle("on", !!appState[pair[1]]);
  });
  var tgColorBtn = document.getElementById("rd-seg-group-color");
  var tgRoleBtn = document.getElementById("rd-seg-group-role");
  if (tgColorBtn) tgColorBtn.classList.toggle("active", tg !== "role");
  if (tgRoleBtn) tgRoleBtn.classList.toggle("active", tg === "role");

  const scopeSection = document.getElementById("rd-scope-section");
  if (scopeSection) scopeSection.classList.toggle("hidden", isDirect);
  const skipScalesRow = document.getElementById("embed-colors-directly");
  if (skipScalesRow) skipScalesRow.classList.toggle("hidden", isDirect);

  const colsEl = document.getElementById("rd-collections");
  if (colsEl) {
    colsEl.innerHTML = "";
    const entries = [];
    if (!skipScales && scope !== "roles") {
      const exists = existing.includes(colorName);
      entries.push([colorName, exists ? "UPDATE" : "CREATE", exists]);
    }
    if (scope !== "groups") {
      const exists = existing.includes(tokenColName);
      entries.push([tokenColName, exists ? "UPDATE" : "CREATE", exists]);
    }
    if (appState.includeSourceColors) {
      const constName = appState.sourceCollectionName || "_constants";
      const exists = existing.includes(constName);
      entries.push([constName, exists ? "UPDATE" : "CREATE", exists]);
    }
    if (entries.length) {
      entries.forEach(([name, label, isExisting]) => {
        colsEl.appendChild(
          el("div", { class: "flex items-center justify-between bg-[var(--bg-card)] border border-[var(--border)] rounded-[8px] px-3 py-2" }, [
            el("span", { class: "text-[13px] text-[var(--text-primary)] font-mono" }, name),
            el(
              "span",
              {
                class: `text-[11px] font-bold px-2 py-0.5 rounded ${isExisting ? "bg-[var(--warning)]/15 text-[var(--warning)]" : "bg-[var(--success)]/15 text-[var(--success)]"}`,
              },
              label,
            ),
          ]),
        );
      });
    } else {
      colsEl.appendChild(el("p", { class: "text-[12px] text-[var(--text-muted)] px-1" }, "No collections will be modified for this scope."));
    }
  }

  const sampleColor = appState.colors[0] || { name: "Primary", shorthand: "pr" };
  const sampleRole = appState.roles[0] || { name: "Text", shorthand: "tx" };
  const cLabel = shortC ? sampleColor.shorthand || sampleColor.name : sampleColor.name;
  const rLabel = shortR ? sampleRole.shorthand || sampleRole.name : sampleRole.name;
  const sampleVar = (appState.variations && appState.variations[2]) || (appState.variations && appState.variations[0]);
  const stepLabel = sampleVar ? (appState.useShorthandVariations && sampleVar.shorthand ? sampleVar.shorthand : sampleVar.name) : "default";
  const exName = tg === "role" ? `${rLabel}/${cLabel}/${stepLabel}` : `${cLabel}/${rLabel}/${stepLabel}`;
  const previewEl = document.getElementById("rd-name-preview");
  if (previewEl) previewEl.textContent = exName;

  const renameEl = document.getElementById("rd-renames");
  const renameListEl = document.getElementById("rd-renames-list");
  if (renameEl && renameListEl) {
    const summary = lastRenameData && lastRenameData.summary;
    const scaleCount = isDirect ? 0 : (summary && summary.scaleCount) || 0;

    const tokenCount = (summary && summary.tokenCount) || 0;
    const changes = ((summary && summary.changes) || []).filter((ch) => (isDirect ? ch.type !== "stepNames" : true));

    if (scaleCount + tokenCount > 0 && changes.length > 0) {
      renameEl.classList.remove("hidden");
      renameListEl.innerHTML = "";
      const typeLabels = { color: "Color", role: "Role", stepNames: "Scale Steps", roleStepNames: "Variation Levels", grouping: "Grouping" };
      changes.forEach((ch) => {
        renameListEl.appendChild(
          el("div", { class: "flex items-center gap-2 bg-[var(--bg-card)] border border-[var(--border)] rounded-[8px] px-3 py-2 min-w-0" }, [
            el("span", { class: "text-[11px] text-[var(--text-muted)] w-[68px] shrink-0" }, typeLabels[ch.type] || ch.type),
            el("span", { class: "text-[11px] font-mono text-[var(--text-primary)] truncate flex-1" }, ch.from),
            el("span", { class: "text-[11px] text-[var(--accent)] shrink-0 px-0.5" }, "→"),
            el("span", { class: "text-[11px] font-mono text-[var(--accent)] truncate flex-1" }, ch.to),
          ]),
        );
      });
      const parts = [
        scaleCount > 0 ? `${scaleCount} scale var${scaleCount > 1 ? "s" : ""}` : "",
        tokenCount > 0 ? `${tokenCount} token var${tokenCount > 1 ? "s" : ""}` : "",
      ]
        .filter(Boolean)
        .join(" · ");
      renameListEl.appendChild(
        el("div", { class: "flex items-center gap-1.5 text-[11px] text-[var(--text-muted)] px-1 pt-0.5" }, [
          el("span", { class: "inline-block w-1.5 h-1.5 rounded-full bg-[var(--accent)] shrink-0" }),
          el("span", {}, `${parts} will be renamed`),
        ]),
      );
    } else {
      renameEl.classList.add("hidden");
    }
  }

  const sumEl = document.getElementById("rd-summary");
  if (sumEl) {
    sumEl.innerHTML = "";
    const colorList = appState.colors.map((c) => `${c.name}${c.shorthand ? ` (${c.shorthand})` : ""}`).join(", ");
    const roleList = appState.roles.map((r) => `${r.name}${r.shorthand ? ` (${r.shorthand})` : ""}`).join(", ");
    const rows = [
      ["Project Name", appState.name || "—"],
      [`Colors x${appState.colors.length}`, colorList],
      [`Roles x${appState.roles.length}`, roleList],
      [
        "Themes",
        appState.themes
          ? appState.themes
              .map(function (t) {
                return t.name;
              })
              .join(", ")
          : "—",
      ],
      ["Mode", isDirect ? "Direct" : "Scale"],
      ...(isDirect
        ? []
        : [
            ["Color Steps", String(appState.scaleLength || 25)],
            ["Scale Algorithm", appState.scaleAlgorithm || "Natural"],
          ]),
    ];
    rows.forEach(([label, value]) => {
      sumEl.appendChild(
        el("div", { class: "flex items-start justify-between gap-2 text-[12px] py-1 border-b border-[var(--border)]/40 last:border-0" }, [
          el("span", { class: "text-[var(--text-muted)] shrink-0" }, label),
          el("span", { class: "text-[var(--text-primary)] text-right text-[11px]" }, value),
        ]),
      );
    });
  }

  const warnEl = document.getElementById("rd-warnings");
  if (warnEl) {
    const relevant = existing.filter((n) => (n === colorName && !skipScales && scope !== "roles") || (n === tokenColName && scope !== "groups"));
    if (relevant.length > 0) {
      warnEl.classList.remove("hidden");
      document.getElementById("rd-warning-text").textContent =
        `${relevant.map((n) => `"${n}"`).join(" and ")} already exist. Variables will be added or updated — nothing deleted.`;
    } else {
      warnEl.classList.add("hidden");
    }
  }
}

let _pendingImportData = null;

function handleImportJSON(json) {
  try {
    const imported = typeof json === "string" ? JSON.parse(json) : json;
    if (!imported.colors || !imported.roles) throw new Error("Invalid Token Wand file — missing colors or roles.");
    _pendingImportData = imported;
    createDialogue("confirm-import-overlay", {
      layout: "stacked",
      icon: _buildImportWarningIcon(),
      title: "Replace Configuration?",
      body: "Loading this file will replace all current palettes, roles, and settings.",
      buttons: [
        {
          label: "Save Current & Import",
          variant: "primary",
          action: () => {
            exportConfig();
            finalizeImport();
          },
        },
        {
          label: "Import & Replace",
          variant: "secondary",
          action: () => {
            finalizeImport();
          },
        },
        { label: t("cancel"), variant: "ghost" },
      ],
    });
  } catch (err) {
    BannerManager.error("Import failed: " + err.message);
  }
}

function finalizeImport() {
  if (!_pendingImportData) return;
  loadState(_pendingImportData);
  _pendingImportData = null;
  syncInputsFromState();
  renderColorGroups();
  renderRoles();
  BannerManager.success("Config imported successfully");
}

function exportConfig() {
  const data = JSON.stringify(appState, null, 2);
  triggerDownload(data, exportFileName("config", "wand"), "application/octet-stream");
}

function exportToCSS() {
  parent.postMessage({ pluginMessage: { type: "request-processed-data", state: appState, exportType: "css" } }, "*");
}
function exportToCSV() {
  parent.postMessage({ pluginMessage: { type: "request-processed-data", state: appState, exportType: "csv" } }, "*");
}
function exportToSCSS() {
  parent.postMessage({ pluginMessage: { type: "request-processed-data", state: appState, exportType: "scss" } }, "*");
}

function _exportSingle(formatId) {
  if (formatId === "wand") {
    exportConfig();
    return;
  }
  parent.postMessage({ pluginMessage: { type: "request-processed-data", state: appState, exportType: formatId } }, "*");
}

function _themeNames() {
  return (appState.themes || []).map((t) =>
    t.name
      .toLowerCase()
      .replace(/\s+/g, "-")
      .replace(/[^a-z0-9-]/g, ""),
  );

function renderFormatCard(def) {
  const themes = _themeNames();
  const files = def.files(themes);
  const isSelected = selectedFormats.has(def.id);

  const fileTree = el(
    "div",
    { class: "mt-1.5 bg-[var(--bg-app)] rounded-[6px] px-2.5 py-2 font-mono text-[10px] text-[var(--text-muted)] leading-[1.7]" },
    files.map((f) => el("div", {}, f)),
  );

  const iconEl = el("div", {
    class: "w-7 h-7 rounded-[6px] flex items-center justify-center shrink-0",
    style: `background:${def.color}22; color:${def.color}`,
  });
  iconEl.innerHTML = Icons[def.iconKey] || "";

  const checkbox = el("div", {
    class: `w-4 h-4 rounded-[4px] border-2 shrink-0 flex items-center justify-center transition-colors ${isSelected ? "border-[var(--accent)] bg-[var(--accent)]" : "border-[var(--border)]"}`,
  });
  if (isSelected)
    checkbox.innerHTML =
      '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  const exportBtn = el(
    "button",
    {
      onclick: (e) => {
        e.stopPropagation();
        _exportSingle(def.id);
        BannerManager.show({ type: "info", message: "Exporting " + def.label + "…", autoClose: 2000 });
      },
      class:
        "shrink-0 h-[26px] px-2.5 rounded-[6px] text-[11px] font-medium border border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text-primary)] hover:border-[var(--accent)] transition-colors",
    },
    "↓ Export",
  );

  const card = el(
    "div",
    {
      "data-format-id": def.id,
      class: `p-3 rounded-[10px] border cursor-pointer transition-all ${isSelected ? "border-[var(--accent)] bg-[var(--accent)]/5" : "border-[var(--border)] bg-[var(--bg-card)]"}`,
      onclick: () => {
        if (selectedFormats.has(def.id)) selectedFormats.delete(def.id);
        else selectedFormats.add(def.id);
        renderExportSheet();
      },
    },
    [
      el("div", { class: "flex items-center gap-2.5" }, [
        checkbox,
        iconEl,
        el("div", { class: "flex-1 min-w-0" }, [
          el("p", { class: "text-[13px] font-semibold text-[var(--text-primary)] leading-tight" }, def.label),
          el("p", { class: "text-[11px] text-[var(--text-muted)] mt-0.5 leading-relaxed" }, def.subtitle),
        ]),
        exportBtn,
      ]),
      fileTree,
    ],
  );

  return card;
}

function renderExportSheet() {
  const list = document.getElementById("export-format-list");
  if (!list) return;
  list.innerHTML = "";
  FORMAT_DEFS.forEach((def) => list.appendChild(renderFormatCard(def)));

  const zipBtn = document.getElementById("btn-export-zip");
  if (zipBtn) {
    const count = selectedFormats.size;
    zipBtn.textContent = count > 0 ? "Export " + count + " Format" + (count > 1 ? "s" : "") + " as ZIP" : "Select formats above";
    zipBtn.disabled = count === 0;
    zipBtn.style.opacity = count === 0 ? "0.4" : "";
  }
}

function triggerDownload(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType || "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function exportFileName(type, ext) {
  const name = (appState.name || "design_system").replace(/\s+/g, "_").replace(/[^a-zA-Z0-9_-]/g, "");
  const now = new Date();
  const date = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
  const time = `${String(now.getHours()).padStart(2, "0")}-${String(now.getMinutes()).padStart(2, "0")}`;
  return `${name}_${type}_${date}_${time}.${ext}`;
}

function showSystemBanners(errors, result = null) {
  if (!errors) return;

  const accessFails = [];
  if (result && result.tokens) {
    for (const mode of Object.keys(result.tokens)) {
      const modeTokens = result.tokens[mode];
      if (!modeTokens) continue;
      for (const clrName in modeTokens) {
        for (const roleId in modeTokens[clrName]) {
          const roleTokens = modeTokens[clrName][roleId];
          for (const varKey in roleTokens) {
            const tkn = roleTokens[varKey];
            if (tkn.contrast && tkn.contrast.rating === "Fail") {
              accessFails.push(`${clrName}/${tkn.role} (${mode})`);
            }
          }
        }
      }
    }
  }

  const critCount = errors.critical ? errors.critical.length : 0;
  const warnCount = errors.warnings ? errors.warnings.length : 0;
  const auditCount = accessFails.length;

  if (critCount === 0 && warnCount === 0 && auditCount === 0) {
    BannerManager.clear();
    return;
  }

  const detailNode = document.createElement("div");
  detailNode.className = "flex flex-col gap-1 mt-2 border-t border-white/10 pt-2";

  function _detailSection(headerText, headerClass, items) {
    const section = document.createElement("div");
    section.className = "mb-2";
    const header = document.createElement("p");
    header.className = `font-bold ${headerClass} mb-1`;
    header.textContent = headerText;
    section.appendChild(header);
    items.forEach((text) => {
      const row = document.createElement("div");
      row.className = "ml-2 text-[10px] opacity-90";
      row.textContent = `• ${text}`;
      section.appendChild(row);
    });
    return section;
  }

  if (critCount > 0)
    detailNode.appendChild(
      _detailSection(
        "Critical Issues:",
        "text-red-400",
        errors.critical.map((e) => `${e.color}/${e.role}: ${e.error}`),
      ),
    );
  if (warnCount > 0)
    detailNode.appendChild(
      _detailSection(
        "Warnings:",
        "text-amber-400",
        errors.warnings.map((w) => `${w.color}/${w.role}: ${w.warning}`),
      ),
    );

  if (auditCount > 0) {
    const section = document.createElement("div");
    const header = document.createElement("p");
    header.className = "font-bold text-blue-400 mb-1";
    header.textContent = "Accessibility Concerns:";
    section.appendChild(header);
    const body = document.createElement("div");
    body.className = "ml-2 text-[10px] opacity-90";
    const shown = accessFails.slice(0, 8);
    shown.forEach((text, i) => {
      if (i > 0) body.appendChild(document.createElement("br"));
      body.appendChild(document.createTextNode(text));
    });
    if (auditCount > 8) {
      body.appendChild(document.createElement("br"));
      body.appendChild(document.createTextNode(`...and ${auditCount - 8} more`));
    }
    section.appendChild(body);
    detailNode.appendChild(section);
  }

  BannerManager.show({
    id: "system-status-banner",
    type: critCount > 0 ? "error" : warnCount > 0 ? "warning" : "info",
    title: critCount > 0 ? "Color System Errors" : "System Audit Results",
    message: `${critCount > 0 ? `${critCount} Critical · ` : ""}${warnCount} Warnings · ${auditCount} Access concerns detected.`,
    detailNode,
    dismissable: true,
  });
}

    <script>/* ui/runtime.js */
const UI_MODES = {
  plugin: ["scale", "direct"],
  grouping: ["color", "role"],
  mapping: ["contrast", "index"],
};

let pendingScope = "all";

let lastCollectionCheckResult = [];
let lastRenameData = null;

let isResizing = false;
let resizeOriginX = 0,
  resizeOriginY = 0;
let resizeStartW = 0,
  resizeStartH = 0;

window.onmessage = (event) => {
  const msg = event.data?.pluginMessage;
  if (!msg) return;

  if (window.parent === window) {
    if (msg.type === "check-collections") {
      setTimeout(() => {
        window.postMessage(
          {
            pluginMessage: {
              type: "collection-check-result",
              existing: [],
              renames: { scale: {}, tokens: {}, summary: { scaleCount: 0, tokenCount: 0, changes: [] } },
            },
          },
          "*",
        );
      }, 50);
      return;
    }
    if (msg.type === "run-creator") {
      localStorage.setItem("tw_state", JSON.stringify(msg.state));
      setTimeout(() => {
        window.postMessage(
          {
            pluginMessage: {
              type: "finish",
              tally: { created: 12, updated: 4, renamed: 0, failed: 0 },
              errors: null,
              result: null,
            },
          },
          "*",
        );
      }, 1000);
      return;
    }
    if (msg.type === "request-processed-data") {
      const config = translateConfig(msg.state);
      const result = variableMaker(config);
      let content = "";
      const et = msg.exportType;
      if (et === "json") content = JSON.stringify({ config, scales: result.scales, tokens: result.tokens, errors: result.errors }, null, 2);
      else if (et === "csv") content = ExportFormatter.toCSV(result, config);
      else if (et === "css") content = ExportFormatter.toCSS(result, config);
      else if (et === "scss") content = generateScss(result, config);
      else if (et === "tailwind") content = fmtTailwind.config(result, config);
      else if (et === "dtcg") content = fmtDTCG.scale(result, config);
      else if (et === "style-dictionary") content = fmtStyleDictionary.global(result, config);
      else if (et === "ios-swift")
        content = Object.keys(result.tokens || {})
          .map((t) => fmtSwift.file(result, config, t))
          .join("\n\n");
      else if (et === "android")
        content = Object.keys(result.tokens || {})
          .map((t) => fmtAndroid.file(result, config, t))
          .join("\n\n");
      else if (et === "rn-ts") content = fmtReactNative.index(result, config);
      setTimeout(() => {
        window.postMessage({ pluginMessage: { type: "processed-data-response", content, exportType: msg.exportType } }, "*");
      }, 50);
      return;
    }
    if (msg.type === "request-export-bundle") {
      const bConfig = translateConfig(msg.state);
      const bResult = variableMaker(bConfig);
      const bFiles = buildExportBundle(bResult, bConfig, msg.formats || [], msg.state);
      setTimeout(() => {
        window.postMessage({ pluginMessage: { type: "export-bundle-response", files: bFiles } }, "*");
      }, 50);
      return;
    }
    if (msg.type === "save-ui-prefs-meta" || msg.type === "resize" || msg.type === "save-config") {
      if (msg.type === "save-ui-prefs-meta") {
        localStorage.setItem("uiPrefsMeta", JSON.stringify(msg.prefs));
      } else if (msg.type === "resize") {
        localStorage.setItem("uiPrefs", JSON.stringify({ width: msg.width, height: msg.height }));
      } else if (msg.type === "save-config") {
        localStorage.setItem("tw_state", JSON.stringify(msg.state));
      }
      return;
    }
  }

  if (msg.type === "capabilities") {
    if (!msg.capabilities.multiMode) {
      const multiModeEls = document.querySelectorAll("[data-requires-multimode]");
      multiModeEls.forEach((el) => el.classList.add("hidden"));
      BannerManager.show({
        id: "cap-multimode",
        type: "warning",
        title: "Figma Starter Plan Limit",
        message: "Figma Starter plans are limited to 1 variable mode per collection. Upgrade your plan to create and publish multiple modes.",
        dismissable: true,
      });
    }
    return;
  }

  if (msg.type === "load-config") {
    const isFirstLaunch = !msg.state || Object.keys(msg.state).length === 0;

    if (isFirstLaunch) {
      renderColorGroups();
      renderRoles();
      syncInputsFromState();
      renderQuickStart();
      showOverlay("quickstart-overlay");
    } else {
      const incoming = msg.state;
      setSavedState(incoming);
      loadState(Object.assign({}, JSON.parse(JSON.stringify(_bootstrapConfig)), incoming));
      renderColorGroups();
      renderRoles();
      syncInputsFromState();
    }
    return;
  }

  if (msg.type === "load-ui-prefs-meta") {
    const VALID_SCALES = [0.7, 0.8, 0.9, 1.0, 1.1, 1.25, 1.5];
    const VALID_THEMES = ["figma", "dark", "light"];
    const VALID_LANGS = ["en", "es", "hi"];
    if (msg.prefs.scale !== undefined) {
      const s = parseFloat(msg.prefs.scale);
      if (VALID_SCALES.includes(s)) uiPrefs.scale = s;
    }
    if (msg.prefs.theme !== undefined && VALID_THEMES.includes(msg.prefs.theme)) {
      uiPrefs.theme = msg.prefs.theme;
    }
    if (msg.prefs.language !== undefined && VALID_LANGS.includes(msg.prefs.language)) {
      uiPrefs.language = msg.prefs.language;
    }
    applyUiPrefs();
    syncUiSettingsInputs();
    return;
  }

  if (msg.type === "collection-check-result") {
    lastCollectionCheckResult = msg.existing || [];
    lastRenameData = msg.renames || null;
    renderRunDialog();
    setRunScope(pendingScope || "all");
    showOverlay("run-dialog-overlay");
    return;
  }

  if (msg.type === "finish") {
    setSavedState(appState);
    markClean();
    pendingScope = "all"; // reset so Alt+Enter always triggers a full sync next time
    hideOverlay("loading-overlay");
    renderSuccessDialog(msg.tally);
    showOverlay("success-overlay");
    showSystemBanners(msg.errors || null, msg.result || null);
    return;
  }

  if (msg.type === "processed-data-response") {
    const { content, exportType } = msg;
    const mimeMap = {
      json: "application/json",
      css: "text/css",
      csv: "text/csv",
      scss: "text/plain",
      tailwind: "text/javascript",
      dtcg: "application/json",
      "style-dictionary": "application/json",
      "ios-swift": "text/plain",
      android: "application/xml",
      "rn-ts": "text/plain",
    };
    const extMap = {
      json: "json",
      css: "css",
      csv: "csv",
      scss: "scss",
      tailwind: "js",
      dtcg: "json",
      "style-dictionary": "json",
      "ios-swift": "swift",
      android: "xml",
      "rn-ts": "ts",
    };
    const typeLabel = {
      json: "tokens",
      css: "variables",
      csv: "token_list",
      scss: "tokens",
      tailwind: "tailwind.config",
      dtcg: "dtcg-tokens",
      "style-dictionary": "sd-tokens",
      "ios-swift": "Colors",
      android: "colors",
      "rn-ts": "tokens",
    };
    triggerDownload(content, exportFileName(typeLabel[exportType] || exportType, extMap[exportType] || exportType), mimeMap[exportType] || "text/plain");
    return;
  }

  if (msg.type === "export-bundle-response") {
    buildAndDownloadZip(appState.name, msg.files || []);
    return;
  }

  if (msg.type === "error") {
    hideOverlay("loading-overlay");
    renderErrorDialog(msg.message);
    showOverlay("error-overlay");
    return;
  }

  if (msg.type === "warning") {
    BannerManager.warn(msg.message, { dismissable: true, autoClose: 8000 });
  }
};

function _detectFigmaTheme() {
  const html = document.documentElement;
  const body = document.body;
  if (html.classList.contains("figma-dark") || body.classList.contains("figma-dark")) return "dark";
  if (html.classList.contains("figma-light") || body.classList.contains("figma-light")) return "light";
  if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) return "dark";
  return "light";
}

function applyUiPrefs() {
  document.documentElement.style.setProperty("--ui-scale", uiPrefs.scale);
  document.body.style.zoom = uiPrefs.scale;
  const theme = uiPrefs.theme === "figma" ? _detectFigmaTheme() : uiPrefs.theme;
  document.body.setAttribute("data-ui-theme", theme);
  if (typeof translateStaticDOM === "function") translateStaticDOM();
}

function updateUiPref(key, value) {
  uiPrefs[key] = value;
  applyUiPrefs();
  parent.postMessage({ pluginMessage: { type: "save-ui-prefs-meta", prefs: uiPrefs } }, "*");
}

function onMouseMove(e) {
  if (!isResizing) return;
  const w = Math.min(UI_DIMS.maxWidth, Math.max(UI_DIMS.minWidth, resizeStartW + (e.clientX - resizeOriginX)));
  const h = Math.min(UI_DIMS.maxHeight, Math.max(UI_DIMS.minHeight, resizeStartH + (e.clientY - resizeOriginY)));
  parent.postMessage({ pluginMessage: { type: "resize", width: w, height: h } }, "*");
}

function onMouseUp() {
  isResizing = false;
  document.removeEventListener("mousemove", onMouseMove);
  document.removeEventListener("mouseup", onMouseUp);
}

const tooltipEl = document.getElementById("tooltip");

document.addEventListener(
  "mouseenter",
  (e) => {
    if (!e.target || !e.target.closest) return;
    const target = e.target.closest("[data-tooltip]");
    if (!target) return;
    const text = target.getAttribute("data-tooltip");
    tooltipEl.textContent = text;
    tooltipEl.classList.add("active");
    const rect = target.getBoundingClientRect();
    const tipRect = tooltipEl.getBoundingClientRect();
    let top = rect.top - tipRect.height - 8;
    let left = rect.left + rect.width / 2 - tipRect.width / 2;
    if (top < 8) top = rect.bottom + 8;
    left = Math.max(8, Math.min(window.innerWidth - tipRect.width - 8, left));
    tooltipEl.style.top = `${top}px`;
    tooltipEl.style.left = `${left}px`;
  },
  true,
);

document.addEventListener(
  "mouseleave",
  (e) => {
    if (!e.target || !e.target.closest) return;
    if (e.target.closest("[data-tooltip]")) tooltipEl.classList.remove("active");
  },
  true,
);

}

(function () {
  function getPreviewPanelForCode(code) {
    if (code === "Digit3") return isDirectMode() ? null : "preview-colors";
    const digit = parseInt(code.replace("Digit", ""), 10);
    if (!isNaN(digit) && digit >= 4) {
      const themeIdx = digit - 4;
      const panel = document.querySelector(`#preview-theme-panels [data-theme-idx="${themeIdx}"]`);
      return panel ? panel.id : null;
    }
    return null;
  }

  function inputFocused() {
    const t = document.activeElement;
    return t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable);
  }

  function settingsOpen() {
    return !document.getElementById("settings-screen").classList.contains("hidden");
  }

  function runDialogOpen() {
    return !document.getElementById("run-dialog-overlay").classList.contains("hidden");
  }

  function previewOpen() {
    return !document.getElementById("preview-screen").classList.contains("hidden");
  }

  function openPreview(panelId) {
    if (!previewOpen()) {
      renderPreviewTabs();
      document.getElementById("main-nav-area").classList.add("hidden");
      const ps = document.getElementById("preview-screen");
      ps.classList.remove("hidden");
      ps.style.display = "flex";
      try {
        renderPreviewPanel(variableMaker(translateConfig(appState)));
      } catch (err) {
        console.error("Preview render failed:", err);
      }
    }
    document.querySelectorAll("#preview-screen .preview-tab-btn").forEach((b) => b.classList.toggle("active", b.dataset.target === panelId));
    document.querySelectorAll("#preview-content .preview-panel, #preview-theme-panels > div").forEach((p) => p.classList.toggle("active", p.id === panelId));
    syncPreviewBackground();
  }

  function closePreview() {
    document.getElementById("preview-screen").classList.add("hidden");
    document.getElementById("preview-screen").style.display = "";
    document.getElementById("main-nav-area").classList.remove("hidden");
    document.querySelectorAll(".sidebar-tab-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === activeSidebarTab));
    const t = document.querySelector(".sidebar-tab-btn.active");
    if (t) t.focus();
  }

  function switchMainTab(tab) {
    if (previewOpen()) closePreview();
    switchSidebarTab(tab);
  }

  document.addEventListener("keydown", (e) => {
    if (!e.altKey || e.shiftKey || e.ctrlKey || e.metaKey) return;
    if (inputFocused() || settingsOpen()) return;
    if (e.key === "Enter") {
      e.preventDefault();
      if (runDialogOpen()) {
        hideOverlay("run-dialog-overlay");
        proceedWithSync();
      } else if (!previewOpen()) {
        handleSubmit(pendingScope || "all");
      }
      return;
    }
    if (e.code === "Digit0") {
      e.preventDefault();
      switchMainTab("project");
    } else if (e.code === "Digit1") {
      e.preventDefault();
      switchMainTab("color-groups");
    } else if (e.code === "Digit2") {
      e.preventDefault();
      switchMainTab("roles-config");
    } else {
      const p = getPreviewPanelForCode(e.code);
      if (p) {
        e.preventDefault();
        openPreview(p);
      }
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && previewOpen() && !settingsOpen()) closePreview();
  });
})();

try {

    <script>/* tests.js */
const TESTS_ENABLED = false;

(function () {
  if (!TESTS_ENABLED) return;

  let _passed = 0, _failed = 0;
  const _groups = [];

  function group(name, fn) {
    const before = { p: _passed, f: _failed };
    fn();
    const p = _passed - before.p, f = _failed - before.f;
    _groups.push({ name, p, f });
  }

  function assert(label, condition, detail) {
    if (condition) {
      _passed++;
    } else {
      _failed++;
      console.error(`  FAIL  ${label}${detail !== undefined ? ` — got: ${JSON.stringify(detail)}` : ""}`);
    }
  }

  function eq(label, actual, expected) {
    const ok = actual === expected;
    if (!ok) console.error(`  FAIL  ${label} — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`);
    ok ? _passed++ : _failed++;
  }

  function close(label, actual, expected, tol) {
    tol = tol || 0.01;
    const ok = typeof actual === "number" && !isNaN(actual) && Math.abs(actual - expected) <= tol;
    if (!ok) console.error(`  FAIL  ${label} — expected ~${expected} (±${tol}), got ${actual}`);
    ok ? _passed++ : _failed++;
  }

  group("validHex", () => {
    assert("accepts 6-char with hash",    validHex("#3B82F6"));
    assert("accepts 6-char without hash", validHex("3B82F6"));
    assert("accepts 3-char with hash",    validHex("#FFF"));
    assert("accepts 3-char without hash", validHex("ABC"));
    assert("rejects 5-char",              !validHex("#12345"));
    assert("rejects non-hex chars",       !validHex("#GGGGGG"));
    assert("rejects empty string",        !validHex(""));
    assert("rejects number",              !validHex(123));
  });

  group("normalizeHex", () => {
    eq("expands 3-char to 6-char",     normalizeHex("#FFF"),     "#FFFFFF");
    eq("expands lowercase 3-char",     normalizeHex("#abc"),     "#AABBCC");
    eq("strips hash and uppercases",   normalizeHex("3b82f6"),   "#3B82F6");
    eq("already-normalized is stable", normalizeHex("#3B82F6"),  "#3B82F6");
    eq("returns null for invalid",     normalizeHex("ZZZZZZ"),   null);
    eq("returns null for empty",       normalizeHex(""),         null);
  });

  group("hexToRgb", () => {
    const black = hexToRgb("#000000");
    const white = hexToRgb("#FFFFFF");
    const red   = hexToRgb("#FF0000");
    assert("black → [0,0,0]",           black && black[0] === 0 && black[1] === 0 && black[2] === 0);
    assert("white → [255,255,255]",     white && white[0] === 255 && white[1] === 255 && white[2] === 255);
    assert("red → [255,0,0]",           red && red[0] === 255 && red[1] === 0 && red[2] === 0);
    assert("returns null for invalid",  hexToRgb("ZZZZZZ") === null);
  });

  group("relLum", () => {
    close("black → 0",   relLum("#000000"), 0,      0.001);
    close("white → 1",   relLum("#FFFFFF"), 1,      0.001);
    close("red → 0.2126", relLum("#FF0000"), 0.2126, 0.005);
    eq("returns null for invalid", relLum("INVALID"), null);
  });

  group("contrastRatio", () => {
    close("black/white → 21",   contrastRatio("#000000", "#FFFFFF"), 21,   0.05);
    close("white/black → 21",   contrastRatio("#FFFFFF", "#000000"), 21,   0.05);
    close("same color → 1",     contrastRatio("#888888", "#888888"), 1,    0.05);
    eq("null on invalid input", contrastRatio("INVALID", "#FFFFFF"), null);
  });

  group("contrastRating", () => {
    eq("near-white on white → Fail", contrastRating("#EEEEEE", "#FFFFFF"), "Fail");
    assert("ratio ≥ 3 < 4.5 → AA Large", ["AA Large", "AA", "AAA"].includes(contrastRating("#888888", "#FFFFFF")));
    eq("black/white → AAA",          contrastRating("#000000", "#FFFFFF"), "AAA");
    eq("null on truly invalid",      contrastRating("ZZZZZZ", "#FFFFFF"), null);
  });

  group("sanitizeHex", () => {
    eq("strips hash",          sanitizeHex("#3b82f6"), "3B82F6");
    eq("uppercases",           sanitizeHex("aabbcc"),  "AABBCC");
    eq("clamps to 6 chars",    sanitizeHex("AABBCCDD"), "AABBCC");
    eq("removes non-hex",      sanitizeHex("ZZ3B82F6"), "3B82F6");
    eq("empty input",          sanitizeHex(""),         "");
    eq("handles undefined",    sanitizeHex(undefined),  "");
  });

  group("rgbToHsl", () => {
    const red   = rgbToHsl(255, 0, 0);
    const white = rgbToHsl(255, 255, 255);
    const black = rgbToHsl(0, 0, 0);
    assert("red → hue 0",       red && red[0] === 0);
    assert("red → sat 100",     red && red[1] === 100);
    assert("red → lum 50",      red && red[2] === 50);
    assert("white → lum 100",   white && white[2] === 100);
    assert("black → lum 0",     black && black[2] === 0);
    eq("null on out-of-range",  rgbToHsl(-1, 0, 0), null);
  });

  group("rgbToHex / hslToHex round-trip", () => {
    const hex   = rgbToHex(59, 130, 246);
    assert("produces valid hex",  hex && /^#[0-9A-F]{6}$/.test(hex));
    const back  = hexToRgb(hex);
    assert("round-trip R",        back && back[0] === 59);
    assert("round-trip G",        back && back[1] === 130);
    assert("round-trip B",        back && back[2] === 246);
    eq("null on out-of-range",    rgbToHex(-1, 0, 0), null);
    eq("hslToHex(0,100,50) → #FF0000",     hslToHex(0, 100, 50), "#FF0000");
  });

  group("hexToOklch / oklchToHex round-trip", () => {
    const samples = ["#3B82F6", "#EF4444", "#10B981", "#F59E0B", "#000000", "#FFFFFF"];
    samples.forEach((hex) => {
      const { L, C, H } = hexToOklch(hex);
      assert(`L in [0,1] for ${hex}`,  L >= 0 && L <= 1);
      assert(`C >= 0 for ${hex}`,      C >= 0);
      assert(`H in [0,360] for ${hex}`, H >= 0 && H <= 360);
      const back = oklchToHex(L, C, H).toUpperCase();
      assert(`round-trip within 2 channels: ${hex}`, back === hex || (() => {
        const [r1, g1, b1] = hexToRgb(hex);
        const [r2, g2, b2] = hexToRgb(back);
        return Math.abs(r1-r2) <= 2 && Math.abs(g1-g2) <= 2 && Math.abs(b1-b2) <= 2;
      })());
    });
  });

  group("hexToHct / hctToHex round-trip", () => {
    const samples = ["#3B82F6", "#EF4444", "#10B981"];
    samples.forEach((hex) => {
      const { h, c, t } = hexToHct(hex);
      assert(`hue in [0,360] for ${hex}`, h >= 0 && h <= 360);
      assert(`chroma >= 0 for ${hex}`,    c >= 0);
      assert(`tone in [0,100] for ${hex}`, t >= 0 && t <= 100);
    });
    const gray = hexToHct("#808080");
    assert("gray has low chroma", gray.c < 5);
  });

  group("scaleMaker — length and validity", () => {
    const algos = ["Natural", "Uniform", "Expressive", "Symmetric", "OKLCH", "Material", "Linear"];
    algos.forEach((algo) => {
      const scale = scaleMaker("#3B82F6", 11, algo);
      eq(`${algo}: returns 11 steps`, scale.length, 11);
      assert(`${algo}: all valid hex`, scale.every((h) => /^#[0-9A-Fa-f]{6}$/i.test(h)));
    });
  });

  group("scaleMaker — light-to-dark ordering", () => {
    ["Natural", "Uniform", "OKLCH", "Material", "Linear"].forEach((algo) => {
      const scale = scaleMaker("#3B82F6", 11, algo);
      const lums = scale.map((h) => relLum(h));
      const ordered = lums.every((v, i) => i === 0 || v <= lums[i - 1] + 0.05);
      assert(`${algo}: roughly light→dark`, ordered);
    });
  });

  group("scaleMaker — scale length variants", () => {
    [5, 11, 23, 25].forEach((len) => {
      const scale = scaleMaker("#0067DD", len, "Natural");
      eq(`length ${len}: correct count`, scale.length, len);
    });
  });

  group("solveColorForContrast — achieves target (light bg)", () => {
    const bg = "#FFFFFF";
    const source = "#3B82F6";
    const targets = [3.0, 4.5, 7.0];
    const modes = ["natural", "saturated", "luminance", "hue-locked", "chroma-maximized"];
    targets.forEach((t) => {
      modes.forEach((m) => {
        const r = solveColorForContrast(source, t, bg, m);
        assert(`${m} @ ${t}: valid hex output`, /^#[0-9A-Fa-f]{6}$/i.test(r.hex));
        assert(`${m} @ ${t}: achievedContrast >= target`, r.achievedContrast >= t - 0.05);
        assert(`${m} @ ${t}: never undershoots`, !r.clipped || r.achievedContrast >= t - 0.1);
      });
    });
  });

  group("solveColorForContrast — achieves target (dark bg)", () => {
    const bg = "#1A1A2E";
    const source = "#3B82F6";
    [3.0, 4.5].forEach((t) => {
      const r = solveColorForContrast(source, t, bg, "natural");
      assert(`dark bg @ ${t}: valid hex`, /^#[0-9A-Fa-f]{6}$/i.test(r.hex));
      assert(`dark bg @ ${t}: achieved >= target`, r.achievedContrast >= t - 0.05);
    });
  });

  group("solveColorForContrast — impossible target", () => {
    const r = solveColorForContrast("#3B82F6", 25, "#FFFFFF", "natural");
    assert("returns fallback hex for impossible target", r.hex === "#000000" || r.hex === "#FFFFFF");
    assert("warning is set", r.warning !== null);
    assert("clipped flag set", r.clipped === true);
  });

  group("solveColorForContrast — achromatic source stays achromatic", () => {
    const r = solveColorForContrast("#808080", 4.5, "#FFFFFF", "natural");
    const { C } = hexToOklch(r.hex);
    assert("gray source → low chroma result", C < 0.05);
  });

  group("validateVariationContrasts", () => {
    const ok = validateVariationContrasts([1.5, 3.0, 4.5, 7.0, 12.0]);
    assert("ascending targets → valid",    ok.valid === true);
    assert("ascending targets → no errors", ok.errors.length === 0);

    const bad = validateVariationContrasts([1.5, 3.0, 2.0, 7.0]);
    assert("non-ascending → invalid",      bad.valid === false);
    assert("non-ascending → has errors",   bad.errors.length > 0);

    const single = validateVariationContrasts([4.5]);
    assert("single target → valid",        single.valid === true);
  });

  group("translateConfig — basic shape", () => {
    const state = {
      name: "Test",
      scaleLength: 11,
      scaleAlgorithm: "Natural",
      pluginMode: "scale",
      colors: [{ name: "Blue", shorthand: "bl", value: "3B82F6", description: "" }],
      roles: [{ name: "Text", shorthand: "tx", minContrast: 4.5, mappingMethod: "contrast", variationTargets: [1.5, 3, 4.5, 7, 12] }],
      themes: [{ name: "Light", bg: "FFFFFF" }, { name: "Dark", bg: "000000" }],
      variations: null,
    };
    const cfg = translateConfig(state);
    eq("scaleLength passed through",  cfg.scaleLength, 11);
    eq("pluginMode passed through",   cfg.pluginMode, "scale");
    eq("color name preserved",        cfg.colors[0].name, "Blue");
    eq("role name preserved",         cfg.roles[0].name, "Text");
    eq("theme count correct",         cfg.themes.length, 2);
    assert("themes deduplicated",     cfg.themes[0].name !== cfg.themes[1].name);
    assert("variations always array", Array.isArray(cfg.variations));
  });

  group("translateConfig — defaults applied", () => {
    const cfg = translateConfig({});
    assert("scaleLength defaults to 23",    cfg.scaleLength === 23);
    assert("pluginMode has default",        typeof cfg.pluginMode === "string");
    assert("colors defaults to array",      Array.isArray(cfg.colors));
    assert("roles defaults to array",       Array.isArray(cfg.roles));
    assert("themes defaults to array",      Array.isArray(cfg.themes) && cfg.themes.length > 0);
    assert("tokenNameSegments is array",     Array.isArray(cfg.tokenNameSegments));
  });

  const _baseState = {
    scaleLength: 11,
    scaleAlgorithm: "Natural",
    pluginMode: "scale",
    useUniformAlgorithm: true,
    colors: [
      { name: "Primary", shorthand: "pr", value: "3B82F6", description: "" },
      { name: "Gray",    shorthand: "gr", value: "808080", description: "" },
    ],
    roles: [
      { name: "Text",       shorthand: "tx", minContrast: 4.5, mappingMethod: "contrast", variationTargets: [1.5, 3, 4.5, 7, 12] },
      { name: "Background", shorthand: "bg", minContrast: 1.2, mappingMethod: "contrast", variationTargets: [1.0, 1.1, 1.2, 1.35, 1.5] },
    ],
    themes: [
      { name: "Light", bg: "FFFFFF" },
      { name: "Dark",  bg: "1A1A2E" },
    ],
    variations: [
      { _id: "v1", name: "Default",  shorthand: "df" },
      { _id: "v2", name: "Subtle",   shorthand: "sb" },
      { _id: "v3", name: "Strong",   shorthand: "st" },
    ],
  };

  group("variableMaker — scale mode structure", () => {
    const result = variableMaker(translateConfig(_baseState));
    assert("no critical errors",         result.errors.critical.length === 0);
    assert("scales not empty",           Object.keys(result.scales).length === 2);
    assert("Primary scale exists",       !!result.scales["Primary"]);
    assert("Gray scale exists",          !!result.scales["Gray"]);
    const primaryScale = result.scales["Primary"];
    eq("Primary scale has 11 steps",     Object.keys(primaryScale).length, 11);

    assert("tokens has Light key", !!result.tokens["light"]);
    assert("tokens has Dark key",  !!result.tokens["dark"]);
    const lightPrimary = result.tokens["light"]["Primary"];
    assert("Light/Primary has roles",    lightPrimary && Object.keys(lightPrimary).length === 2);
  });

  group("variableMaker — scale mode token values", () => {
    const result = variableMaker(translateConfig(_baseState));
    const lightTokens = result.tokens["light"]["Primary"];
    Object.values(lightTokens).forEach((roleTokens) => {
      Object.values(roleTokens).forEach((token) => {
        assert(`token hex is valid: ${token.value}`, /^#[0-9A-Fa-f]{6}$/i.test(token.value));
        assert(`token has contrast ratio`,           typeof token.contrast.ratio === "number");
        assert(`token has tokenName`,                typeof token.tokenName === "string");
      });
    });
  });

  group("variableMaker — direct mode", () => {
    const directState = Object.assign({}, _baseState, { pluginMode: "direct" });
    const result = variableMaker(translateConfig(directState));
    assert("no critical errors",       result.errors.critical.length === 0);
    eq("scales is empty",              Object.keys(result.scales).length, 0);
    assert("tokens populated",         Object.keys(result.tokens).length === 2);
    const lightPrimary = result.tokens["light"]["Primary"];
    assert("tokens present",           lightPrimary && Object.keys(lightPrimary).length > 0);
    Object.values(lightPrimary).forEach((roleTokens) => {
      Object.values(roleTokens).forEach((token) => {
        assert(`direct token hex valid: ${token.value}`, /^#[0-9A-Fa-f]{6}$/i.test(token.value));
        const ratio = token.contrast.ratio;
        assert(`direct contrast is a number`, typeof ratio === "number" && ratio >= 1);
      });
    });
  });

  group("variableMaker — scale hex validity", () => {
    const result = variableMaker(translateConfig(_baseState));
    Object.entries(result.scales).forEach(([colorName, scale]) => {
      Object.entries(scale).forEach(([step, data]) => {
        assert(`${colorName}[${step}] is valid hex`, /^#[0-9A-Fa-f]{6}$/i.test(data.value));
        assert(`${colorName}[${step}] has contrast object`, typeof data.contrast === "object");
      });
    });
  });

const EXPORT_TESTS_ENABLED = false;

    return {
      pass(msg)         { s.checks.push({ ok: true,  msg }); s.pass++; _totalPass++; },
      fail(msg, detail) { s.checks.push({ ok: false, msg, detail }); s.fail++; _totalFail++; },
      warn(msg)         { s.checks.push({ ok: "warn", msg }); s.warn++; _totalWarn++; },
      assert(msg, cond, detail) { cond ? this.pass(msg) : this.fail(msg, detail); },
      assertMatch(msg, str, pattern) { this.assert(msg, pattern.test(str), str.substring(0, 120)); },
      assertCount(msg, arr, min)     { this.assert(msg + " (got " + arr.length + ", need ≥" + min + ")", arr.length >= min, arr.length); },
    };
  }

  function buildForPreset(preset) {
    const config = translateConfig(preset.config);
    const result = variableMaker(config);
    return { config, result };
  }

  function themeKeys(result) { return Object.keys(result.tokens || {}); }

  function countTokens(result) {
    let n = 0;
    const themes = themeKeys(result);
    for (const t of themes) {
      const tm = result.tokens[t];
      if (!tm) continue;
      for (const c of Object.values(tm))
        for (const r of Object.values(c))
          n += Object.keys(r).length;
    }
    return n;
  }

  function countScaleSteps(result) {
    let n = 0;
    for (const scale of Object.values(result.scales || {})) n += Object.keys(scale).length;
    return n;
  }

  function testCSS(s, result, config, hasScales) {
    const themes = themeKeys(result);

    const scale = fmtCSS.scale(result, config);
    s.assertMatch("CSS scale: starts with :root", scale, /^\s*\/\*.*\*\/\s*\n:root\s*\{/);
    s.assertMatch("CSS scale: closes :root", scale, /\}\s*$/);
    if (hasScales) {
      s.assertMatch("CSS scale: has -- var declarations", scale, /--[a-z0-9-]+:\s*#[0-9a-fA-F]{3,6}/);
      const scaleVars = (scale.match(/--[a-z]/g) || []).length;
      s.assertCount("CSS scale: has scale variables", { length: scaleVars }, countScaleSteps(result) * 0.8);
    } else {
      s.warn("CSS scale: no scale vars (direct mode — expected)");
    }

    for (let ti = 0; ti < themes.length; ti++) {
      const t = themes[ti];
      const css = fmtCSS.theme(result, config, t, ti === 0);
      s.assertMatch("CSS theme[" + t + "]: has selector", css, /\[data-theme=|:root/);
      s.assertMatch("CSS theme[" + t + "]: has -- vars", css, /--[a-z0-9-]+:\s*#/);
      s.assertMatch("CSS theme[" + t + "]: closes block", css, /\}\s*$/);
      if (t.toLowerCase() === "dark") {
        s.assertMatch("CSS dark: has @media prefers-color-scheme", css, /@media\s*\(prefers-color-scheme:\s*dark\)/);
        s.assertMatch("CSS dark: has :root:not([data-theme])", css, /:root:not\(\[data-theme\]\)/);
      }
    }
  }

  function testSCSS(s, result, config, hasScales) {
    const scale  = fmtSCSS.scale(result, config);
    const tokens = fmtSCSS.tokens(result, config);
    const index  = fmtSCSS.index(result, config);

    if (hasScales) {
      s.assertMatch("SCSS scale: has $variable declarations", scale, /\$[a-z0-9-]+:\s*#[0-9a-fA-F]/);
      s.assertMatch("SCSS scale: has $scale- map", scale, /\$scale-[a-z0-9-]+:\s*\(/);
      s.assertMatch("SCSS scale: map closes with );", scale, /\);\s*\n/);
    } else {
      s.warn("SCSS scale: no scale vars (direct mode — expected)");
    }

    s.assertMatch("SCSS tokens: has $tokens- map", tokens, /\$tokens-[a-z]+:/);
    s.assertMatch("SCSS tokens: token map has string keys", tokens, /\"[a-z0-9-]+\":\s*[\$#]/);
    s.assertMatch("SCSS tokens: @forward 'scale'", tokens, /@forward 'scale'/);

    s.assertMatch("SCSS index: has apply-theme mixin", index, /@mixin apply-theme/);
    s.assertMatch("SCSS index: mixin uses @each", index, /@each \$name, \$value in \$tokens/);
    s.assertMatch("SCSS index: has :root selector output", index, /:root[^{]*\{/);
    s.assertMatch("SCSS index: includes apply-theme call", index, /@include apply-theme/);

    const themes = themeKeys(result);
    if (themes.find(t => t.toLowerCase() === "dark")) {
      s.assertMatch("SCSS index: has OS dark fallback", index, /@media\s*\(prefers-color-scheme:\s*dark\)/);
    }
  }

  function testTailwind(s, result, config) {
    const out = fmtTailwind.config(result, config);
    s.assertMatch("Tailwind: starts with @type jsdoc", out, /\/\*\* @type/);
    s.assertMatch("Tailwind: module.exports =", out, /module\.exports\s*=/);
    s.assertMatch("Tailwind: has theme.extend.colors", out, /theme[\s\S]*extend[\s\S]*colors/);
    s.assertMatch("Tailwind: colors use var(--)", out, /var\(--[a-z0-9-]+\)/);
    s.assertMatch("Tailwind: has plugins: []", out, /plugins:\s*\[\]/);

    const colorKeys = Object.keys(result.scales || {});
    if (colorKeys.length > 0) {
      const firstColor = _slug(_colorLabel(colorKeys[0], config));
      s.assertMatch("Tailwind: first color group present", out, new RegExp('"' + firstColor + '"\\s*:\\s*\\{'));
    }
  }

  function testDTCG(s, result, config, hasScales) {

    let scaleJson;
    try { scaleJson = JSON.parse(fmtDTCG.scale(result, config)); s.pass("DTCG scale: valid JSON"); }
    catch(e) { s.fail("DTCG scale: invalid JSON", e.message); return; }

    const scaleColors = Object.keys(scaleJson);
    if (!hasScales) { s.warn("DTCG scale: no color groups (direct mode — expected)"); return; }
    s.assertCount("DTCG scale: has color groups", scaleColors, 1);
    const firstColor = scaleJson[scaleColors[0]];
    if (!firstColor) return;
    const firstStep = Object.values(firstColor)[0];
    s.assert("DTCG scale: $value field present", firstStep && firstStep["$value"], firstStep);
    s.assert("DTCG scale: $type is 'color'", firstStep && firstStep["$type"] === "color", firstStep && firstStep["$type"]);
    s.assertMatch("DTCG scale: $value is hex", String((firstStep || {})["$value"]), /^#[0-9A-Fa-f]{6}$/);

    const themes = themeKeys(result);
    for (const t of themes) {
      try { JSON.parse(fmtDTCG.theme(result, config, t)); s.pass("DTCG theme[" + t + "]: valid JSON"); }
      catch(e) { s.fail("DTCG theme[" + t + "]: invalid JSON", e.message); continue; }

      const raw = fmtDTCG.theme(result, config, t);
      const aliases = raw.match(/\{[a-z0-9-]+\.[a-z0-9-]+\}/g) || [];
      if (aliases.length > 0) {
        s.assertMatch("DTCG theme[" + t + "]: alias uses dot-path {color.step}", aliases[0], /\{[a-z0-9-]+\.[a-z0-9-]+\}/);
      } else {

        s.warn("DTCG theme[" + t + "]: no alias references (direct mode or all resolved to hex)");
      }
    }
  }

  function testStyleDictionary(s, result, config, hasScales) {

    let globalJson;
    try { globalJson = JSON.parse(fmtStyleDictionary.global(result, config)); s.pass("SD global: valid JSON"); }
    catch(e) { s.fail("SD global: invalid JSON", e.message); return; }

    if (hasScales) {
      s.assert("SD global: top-level 'color' key", !!globalJson.color, Object.keys(globalJson));
      const firstColorGroup = Object.values(globalJson.color || {})[0] || {};
      const firstToken = Object.values(firstColorGroup)[0];
      s.assert("SD global: token has 'value'", firstToken && firstToken.value !== undefined, firstToken);
      s.assert("SD global: token has 'type'", firstToken && firstToken.type === "color", firstToken && firstToken.type);
      s.assert("SD global: token has 'attributes'", firstToken && typeof firstToken.attributes === "object", firstToken);
    } else {
      s.warn("SD global: no scale tokens (direct mode — expected)");
    }

    const themes = themeKeys(result);
    for (const t of themes) {
      let themeJson;
      try { themeJson = JSON.parse(fmtStyleDictionary.theme(result, config, t)); s.pass("SD theme[" + t + "]: valid JSON"); }
      catch(e) { s.fail("SD theme[" + t + "]: invalid JSON", e.message); continue; }

      s.assert("SD theme[" + t + "]: has 'color' key", !!themeJson.color, Object.keys(themeJson));
      const raw = fmtStyleDictionary.theme(result, config, t);

      const aliases = raw.match(/"\{color\.[^}]+\}"/g) || [];
      if (aliases.length > 0) {
        s.assertMatch("SD theme[" + t + "]: alias brace syntax", aliases[0], /"\{color\.[a-z0-9.-]+\}"/);
      } else {
        s.warn("SD theme[" + t + "]: no aliases (direct mode)");
      }
    }
  }

  function testSwift(s, result, config) {
    const themes = themeKeys(result);
    for (const t of themes) {
      const swift = fmtSwift.file(result, config, t);
      s.assertMatch("Swift[" + t + "]: import UIKit", swift, /import UIKit/);
      s.assertMatch("Swift[" + t + "]: import SwiftUI", swift, /import SwiftUI/);
      s.assertMatch("Swift[" + t + "]: extension UIColor", swift, /extension UIColor\s*\{/);
      s.assertMatch("Swift[" + t + "]: extension Color", swift, /extension Color\s*\{/);
      s.assertMatch("Swift[" + t + "]: static let declarations", swift, /static let [a-zA-Z]+ =/);
      s.assertMatch("Swift[" + t + "]: UIColor(red: ... alpha:)", swift, /UIColor\(red:\s*[\d.]+,\s*green:\s*[\d.]+,\s*blue:\s*[\d.]+,\s*alpha:\s*1\)/);
      s.assertMatch("Swift[" + t + "]: Color(red:)", swift, /Color\(red:\s*[\d.]+/);

      const vals = swift.match(/red:\s*([\d.]+)/g) || [];
      let allInRange = vals.every(v => { const n = parseFloat(v.replace("red:", "").trim()); return n >= 0 && n <= 1; });
      s.assert("Swift[" + t + "]: color components in 0–1 range", allInRange, vals.slice(0, 3));

      s.assertMatch("Swift[" + t + "]: MARK scale section", swift, /\/\/ MARK: - UIColor Scale/);
      s.assertMatch("Swift[" + t + "]: MARK semantic section", swift, /\/\/ MARK: - UIColor Semantic/);
    }
  }

  function testAndroid(s, result, config) {
    const themes = themeKeys(result);
    for (let ti = 0; ti < themes.length; ti++) {
      const t = themes[ti];
      const xml = fmtAndroid.file(result, config, t);
      s.assertMatch("Android[" + t + "]: XML declaration", xml, /^<\?xml version="1\.0" encoding="utf-8"\?>/);
      s.assertMatch("Android[" + t + "]: <resources> root", xml, /<resources>/);
      s.assertMatch("Android[" + t + "]: closes </resources>", xml, /<\/resources>/);
      s.assertMatch("Android[" + t + "]: <color name=...> elements", xml, /<color name="[a-z0-9_]+">/);

      const colorVals = xml.match(/#[0-9A-F]{8}/g) || [];
      s.assertCount("Android[" + t + "]: has #AARRGGBB values", colorVals, 1);
      s.assert("Android[" + t + "]: all colors start with #FF (opaque)", colorVals.every(v => v.startsWith("#FF")), colorVals.slice(0, 3));

      const names = xml.match(/name="([^"]+)"/g) || [];
      const badNames = names.filter(n => /[A-Z\-]/.test(n));
      s.assert("Android[" + t + "]: names are snake_case", badNames.length === 0, badNames.slice(0, 3));

      const qualifier = ti === 0 ? "values" : "values-" + t.toLowerCase();
      s.pass("Android[" + t + "]: would map to res/" + qualifier + "/colors.xml");
    }
  }

  function testReactNative(s, result, config) {
    const themes = themeKeys(result);

    const index = fmtReactNative.index(result, config);
    s.assertMatch("RN index: imports theme files", index, /import\s*\{/);
    s.assertMatch("RN index: Theme type union", index, /type Theme\s*=/);
    s.assertMatch("RN index: themeMap object", index, /const themeMap\s*=/);
    s.assertMatch("RN index: as const assertion", index, /as const/);
    s.assertMatch("RN index: useTokens function", index, /function useTokens\(theme: Theme\)/);
    s.assertMatch("RN index: re-exports themes", index, /export\s*\{/);
    for (const t of themes) {
      s.assertMatch("RN index: imports " + t, index, new RegExp("import.*" + _slug(t)));
    }

    for (const t of themes) {
      const themeFile = fmtReactNative.theme(result, config, t);
      s.assertMatch("RN theme[" + t + "]: export const ...Tokens", themeFile, /export const [a-zA-Z0-9]+Tokens\s*=/);
      s.assertMatch("RN theme[" + t + "]: as const assertion", themeFile, /\}\s*as const/);
      if (countScaleSteps(result) > 0) {
        s.assertMatch("RN theme[" + t + "]: scale key", themeFile, /scale\s*:\s*\{/);
      } else {
        s.warn("RN theme[" + t + "]: scale key skipped (direct mode — no scales)");
      }
      s.assertMatch("RN theme[" + t + "]: tokens key", themeFile, /tokens\s*:\s*\{/);
      s.assertMatch("RN theme[" + t + "]: hex string values", themeFile, /"#[0-9A-Fa-f]{6}"\s+as string/);
      s.assertMatch("RN theme[" + t + "]: type export", themeFile, /export type [a-zA-Z0-9]+TokensType/);
    }
  }

  function testCSV(s, result, config) {
    const csv = ExportFormatter.toCSV(result, config);
    s.assertMatch("CSV: COLOR SCALES section header", csv, /COLOR SCALES/);
    s.assertMatch("CSV: ROLE TOKENS section header", csv, /ROLE TOKENS/);
    s.assertMatch("CSV: scale header row starts with Group,Step,Hex", csv, /Group,Step,Hex/);
    s.assertMatch("CSV: scale header has Contrast column", csv, /Contrast/);
    s.assertMatch("CSV: token header row", csv, /Color,Role,Variation,Theme,Hex,Contrast,Rating,Adjusted/);

    const allLines = csv.split("\n");
    const scaleHeaderLine = allLines.find(l => l.startsWith("Group,Step,Hex"));
    const tokenHeaderLine = allLines.find(l => l.startsWith("Color,Role,Variation"));
    const scaleColCount = scaleHeaderLine ? scaleHeaderLine.split(",").length : 7;
    const tokenColCount = tokenHeaderLine ? tokenHeaderLine.split(",").length : 8;

    const dataLines = allLines.filter(l => l.trim() && !l.startsWith("COLOR") && !l.startsWith("ROLE") && l !== scaleHeaderLine && l !== tokenHeaderLine);
    let badRows = 0;
    dataLines.forEach(line => {
      const cols = line.split(",").length;
      if (cols !== scaleColCount && cols !== tokenColCount) badRows++;
    });
    s.assert("CSV: all data rows match header column count", badRows === 0, badRows + " bad rows");

    const hexVals = csv.match(/#[0-9A-Fa-f]{6}/g) || [];
    s.assertCount("CSV: contains hex values", hexVals, countScaleSteps(result));
  }

  function testBundler(s, result, config, appState) {
    const allFormats = ["css","scss","tailwind","dtcg","style-dictionary","ios-swift","android","rn-ts","csv","wand"];
    const files = buildExportBundle(result, config, allFormats, appState);

    s.assertCount("Bundle: produces files", files, allFormats.length);
    files.forEach(f => {
      s.assert("Bundle file has path",    typeof f.path === "string" && f.path.length > 0, f);
      s.assert("Bundle file has content", typeof f.content === "string" && f.content.length > 0, f.path);
    });

    const paths = files.map(f => f.path);
    s.assert("Bundle: css/scale.css present",               paths.includes("css/scale.css"), paths);
    s.assert("Bundle: scss/scale.scss present",             paths.includes("scss/scale.scss"), paths);
    s.assert("Bundle: tailwind/tailwind.config.js present", paths.includes("tailwind/tailwind.config.js"), paths);
    s.assert("Bundle: dtcg/scale.json present",             paths.includes("dtcg/scale.json"), paths);
    s.assert("Bundle: style-dictionary/global.json present", paths.includes("style-dictionary/global.json"), paths);
    s.assert("Bundle: rn/tokens/index.ts present",          paths.includes("rn/tokens/index.ts"), paths);
    s.assert("Bundle: tokens.csv present",                  paths.includes("tokens.csv"), paths);
    s.assert("Bundle: config.wand present",                 paths.includes("config.wand"), paths);

    const themes = themeKeys(result);
    for (const t of themes) {
      const tSlug = _slug(t);
      s.assert("Bundle: css/themes/" + tSlug + ".css", paths.includes("css/themes/" + tSlug + ".css"), paths.filter(p => p.startsWith("css")));
      s.assert("Bundle: dtcg/themes/" + tSlug + ".json", paths.includes("dtcg/themes/" + tSlug + ".json"), paths.filter(p => p.startsWith("dtcg")));
      s.assert("Bundle: rn/tokens/" + tSlug + ".ts", paths.includes("rn/tokens/" + tSlug + ".ts"), paths.filter(p => p.startsWith("rn")));
    }

    const uniquePaths = new Set(paths);
    s.assert("Bundle: no duplicate file paths", uniquePaths.size === paths.length, paths.length - uniquePaths.size + " duplicates");

    const wandFile = files.find(f => f.path === "config.wand");
    if (wandFile) {
      try { JSON.parse(wandFile.content); s.pass("Bundle: config.wand is valid JSON"); }
      catch(e) { s.fail("Bundle: config.wand is invalid JSON", e.message); }
    }
  }

  function testPreset(preset) {
    const label = "[" + preset.badge + "] " + preset.name;
    const s = suite(label);

    let config, result;
    try {
      ({ config, result } = buildForPreset(preset));
    } catch(e) {
      s.fail("buildForPreset failed", e.message);
      return;
    }

    const steps  = countScaleSteps(result);
    const tokens = countTokens(result);
    const themes = themeKeys(result);

    const hasScales = steps > 0;

    if (hasScales) {
      s.assert("Engine: produces scales", true, steps);
    } else {
      s.warn("Engine: no scales (direct mode — expected)");
    }
    s.assertCount("Engine: themes",            themes, Math.max(1, preset.config.themes.length - 1));
    s.assert("Engine: produces tokens",        tokens > 0, tokens);
    s.assert("Engine: no critical errors",     !result.errors || !result.errors.critical || result.errors.critical.length === 0,
      result.errors && result.errors.critical && result.errors.critical.map(e => e.error));

    testCSS(s, result, config, hasScales);
    testSCSS(s, result, config, hasScales);
    testTailwind(s, result, config);
    testDTCG(s, result, config, hasScales);
    testStyleDictionary(s, result, config, hasScales);
    testSwift(s, result, config);
    testAndroid(s, result, config);
    testReactNative(s, result, config);
    testCSV(s, result, config);
    testBundler(s, result, config, preset.config);
  }

  console.group("%c Token Wand — Export Engine Tests", "font-size:14px;font-weight:bold;color:#6366f1");
  console.log("Running against " + PRESETS.length + " presets × 10 formats…\n");

  PRESETS.forEach(testPreset);

  console.log("\n" + "─".repeat(70));
  console.log("%c RESULTS BY PRESET", "font-weight:bold;font-size:12px");
  console.log("─".repeat(70));

  _results.forEach(r => {
    const status = r.fail === 0 ? (r.warn > 0 ? "⚠" : "✓") : "✗";
    const color  = r.fail === 0 ? (r.warn > 0 ? "#f59e0b" : "#22c55e") : "#ef4444";
    const label  = `%c ${status} ${r.label}`;
    const detail = `  ${r.pass} pass  ${r.fail} fail  ${r.warn} warn`;
    console.log(label + "  " + detail, "color:" + color + ";font-weight:bold");

    r.checks.filter(c => !c.ok && c.ok !== "warn").forEach(c => {
      console.error("    ✗", c.msg, c.detail !== undefined ? "→ " + JSON.stringify(c.detail).substring(0, 100) : "");
    });
    r.checks.filter(c => c.ok === "warn").forEach(c => {
      console.warn("    ⚠", c.msg);
    });
  });

  console.log("\n" + "─".repeat(70));
  console.log("%c SUMMARY", "font-weight:bold;font-size:12px");
  console.log("─".repeat(70));

  const presetsOk   = _results.filter(r => r.fail === 0).length;
  const presetsFail = _results.filter(r => r.fail > 0).length;

  console.log(`Presets:   ${PRESETS.length} total | ${presetsOk} fully passing | ${presetsFail} with failures`);
  console.log(`Checks:    ${_totalPass + _totalFail + _totalWarn} total | %c${_totalPass} pass%c | %c${_totalFail} fail%c | %c${_totalWarn} warn`,
    "color:#22c55e;font-weight:bold","","color:#ef4444;font-weight:bold","","color:#f59e0b;font-weight:bold");

  if (_totalFail === 0) {
    console.log("%c ✓ All export formats valid across all presets.", "color:#22c55e;font-size:13px;font-weight:bold");
  } else {
    console.warn(`%c ✗ ${_totalFail} check(s) failed — see details above.`, "color:#ef4444;font-size:13px;font-weight:bold");
  }

  const formatIds = ["css","scss","tailwind","dtcg","style-dictionary","ios-swift","android","rn-ts","csv","bundle"];
  console.log("\n%c Format × Preset matrix (✓ = all pass, ✗ = failures, ─ = not tested)", "color:gray;font-size:11px");

  const matrixRows = _results.map(r => {
    const row = { preset: r.label.replace(/^\[.*?\]\s*/, "") };
    const byFormat = {};
    r.checks.forEach(c => {
      const fmtMatch = c.msg.match(/^(CSS|SCSS|Tailwind|DTCG|SD|Swift|Android|RN|CSV|Bundle|Engine)/i);
      if (fmtMatch) {
        const key = fmtMatch[1].toLowerCase();
        if (!byFormat[key]) byFormat[key] = { pass: 0, fail: 0 };
        if (c.ok === true) byFormat[key].pass++;
        else if (c.ok === false) byFormat[key].fail++;
      }
    });
    formatIds.forEach(f => {
      const key = f === "style-dictionary" ? "sd" : f === "ios-swift" ? "swift" : f === "rn-ts" ? "rn" : f;
      const entry = byFormat[key] || byFormat[f] || null;
      row[f] = entry ? (entry.fail > 0 ? "✗" : "✓") : "─";
    });
    return row;
  });

  console.table(matrixRows);
  console.groupEnd();

})();
</script>
